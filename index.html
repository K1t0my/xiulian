<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绿茵长路 — 球员生涯模式</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#060a07;--bg1:#0c140f;--bg2:#132019;--bg3:#1b3024;
  --accent:#3ddc84;--accent2:#00bfa5;--glow:rgba(61,220,132,0.12);
  --gold:#ffd700;--red:#ff4757;--blue:#5b9aff;
  --text:#dce8df;--dim:#5f9070;--border:#1a2e22;--card:#0e1812;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 30% 10%,rgba(61,220,132,0.03) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 90%,rgba(0,191,165,0.025) 0%,transparent 60%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg0)}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding-bottom:60px}
.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg1),rgba(12,20,15,0.96));backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:12px 16px 8px}
.logo{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--gold));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:sh 4s ease infinite}
@keyframes sh{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.meta{font-size:10px;color:var(--dim);margin-top:2px}
.nav{display:flex;gap:3px;margin-top:8px;overflow-x:auto}
.nb{padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;font-size:11px;font-family:inherit;font-weight:500;transition:all .2s;white-space:nowrap}
.nb:hover{background:var(--bg2);color:var(--text)}.nb.on{background:var(--glow);border-color:var(--accent);color:var(--accent);font-weight:700}
.ct{padding:14px 14px 0}
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 15px;margin-bottom:9px;transition:all .2s}
.card.ck{cursor:pointer}.card.ck:hover{border-color:var(--accent);background:var(--glow);transform:translateX(4px)}
.card.gl{border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.03)}
.btn{padding:7px 18px;border-radius:7px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .2s}
.btn:hover{background:var(--bg3);border-color:var(--accent)}.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg0);border:none;font-weight:700}
.btn-p:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 16px rgba(61,220,132,.2)}
.btn-d{border-color:var(--red);color:var(--red)}.btn-d:hover{background:rgba(255,71,87,.1)}
.btn-full{width:100%}.btn-lg{font-size:15px;padding:13px 40px;border-radius:11px}
.fb{display:flex;justify-content:space-between;align-items:center}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.center{text-align:center}.dim{color:var(--dim)}.sm{font-size:11px}.xs{font-size:10px}.bold{font-weight:700}.accent{color:var(--accent)}.gold{color:var(--gold)}.red{color:var(--red)}.blue{color:var(--blue)}
.mt4{margin-top:4px}.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mb6{margin-bottom:6px}.mb10{margin-bottom:10px}
.sec{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:9px}
.badge{display:inline-block;background:var(--glow);border:1px solid var(--accent);border-radius:5px;padding:2px 10px;font-size:10px;font-weight:600;color:var(--accent)}
.ab{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:11px}
.ab-l{width:38px;text-align:right;color:var(--dim);flex-shrink:0;font-size:10px}
.ab-t{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.ab-f{height:100%;border-radius:4px;transition:width .4s}
.ab-v{width:18px;font-weight:700;font-size:11px}
.sg{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.sb{background:var(--bg2);border-radius:7px;padding:7px 10px;text-align:center;min-width:58px;flex:1}
.sb-i{font-size:14px}.sb-v{font-size:15px;font-weight:700;margin-top:1px}.sb-l{font-size:9px;color:var(--dim)}
.ca-t{height:9px;background:var(--bg2);border-radius:5px;position:relative;overflow:hidden;margin-top:3px}
.ca-pa{position:absolute;height:100%;background:rgba(61,220,132,.13);border-radius:5px}
.ca-c{position:absolute;height:100%;background:var(--accent);border-radius:5px;transition:width .5s}
.modal-o{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg1);border-radius:14px;padding:30px;max-width:400px;width:92%;text-align:center;border:1px solid var(--gold)}
.notif{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--accent);border-radius:9px;padding:9px 22px;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:7px 6px;text-align:left;color:var(--dim);font-weight:500;border-bottom:1.5px solid var(--border)}
.tbl td{padding:6px;border-bottom:1px solid var(--border)}.tbl .c{text-align:center}.tbl tr.me{background:var(--glow)}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.anim{animation:fu .3s ease-out both}.pulse{animation:pulse 1.5s infinite}
.choice-grid{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.choice-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;text-align:left}
.choice-btn:hover{border-color:var(--accent);background:var(--glow);transform:translateX(4px)}
.choice-title{font-weight:700;font-size:13px;margin-bottom:3px}
.choice-desc{font-size:11px;color:var(--dim);line-height:1.4}
.timeline{position:relative;padding-left:20px;border-left:2px solid var(--border)}
.tl-dot{position:absolute;left:-6px;width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid var(--bg0)}
.tl-item{position:relative;padding-bottom:14px}
.portrait{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--accent));display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid var(--accent);flex-shrink:0}
.xp-bar{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:4px}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:3px;transition:width .5s}
</style>
</head>
<body>
<div id="app"></div>
<script>
const R=(a,b)=>a+Math.random()*(b-a),RI=(a,b)=>Math.floor(R(a,b+1)),pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const fmt$=v=>v>=1e6?`€${(v/1e6).toFixed(1)}M`:v>=1e3?`€${(v/1e3)|0}K`:`€${v}`;
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};
const NATIONS=[{id:1,n:"巴西",f:"🇧🇷"},{id:2,n:"阿根廷",f:"🇦🇷"},{id:3,n:"法国",f:"🇫🇷"},{id:4,n:"西班牙",f:"🇪🇸"},{id:5,n:"德国",f:"🇩🇪"},{id:6,n:"英格兰",f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{id:7,n:"意大利",f:"🇮🇹"},{id:8,n:"荷兰",f:"🇳🇱"},{id:9,n:"葡萄牙",f:"🇵🇹"},{id:10,n:"日本",f:"🇯🇵"},{id:11,n:"韩国",f:"🇰🇷"},{id:12,n:"中国",f:"🇨🇳"}];
const POS={GK:{n:"门将",e:"🧤",z:"DEF"},CB:{n:"中后卫",e:"🛡️",z:"DEF"},LB:{n:"左后卫",e:"⬅️",z:"DEF"},RB:{n:"右后卫",e:"➡️",z:"DEF"},CDM:{n:"后腰",e:"🔒",z:"MID"},CM:{n:"中场",e:"⚙️",z:"MID"},CAM:{n:"前腰",e:"🎯",z:"MID"},LW:{n:"左边锋",e:"💨",z:"ATK"},RW:{n:"右边锋",e:"💨",z:"ATK"},ST:{n:"前锋",e:"⚽",z:"ATK"}};
const CLUBS=[{id:1,n:"皇家马德里",s:"皇马",rep:96,tier:1,lg:"西甲"},{id:2,n:"巴塞罗那",s:"巴萨",rep:94,tier:1,lg:"西甲"},{id:3,n:"拜仁慕尼黑",s:"拜仁",rep:93,tier:1,lg:"德甲"},{id:4,n:"曼彻斯特城",s:"曼城",rep:95,tier:1,lg:"英超"},{id:5,n:"利物浦",s:"利物浦",rep:91,tier:1,lg:"英超"},{id:6,n:"巴黎圣日耳曼",s:"大巴黎",rep:90,tier:1,lg:"法甲"},{id:7,n:"国际米兰",s:"国米",rep:88,tier:1,lg:"意甲"},{id:8,n:"多特蒙德",s:"多特",rep:85,tier:2,lg:"德甲"},{id:9,n:"马德里竞技",s:"马竞",rep:86,tier:2,lg:"西甲"},{id:10,n:"AC米兰",s:"米兰",rep:85,tier:2,lg:"意甲"},{id:11,n:"阿森纳",s:"阿森纳",rep:88,tier:1,lg:"英超"},{id:12,n:"热刺",s:"热刺",rep:82,tier:2,lg:"英超"},{id:13,n:"塞维利亚",s:"塞维利亚",rep:78,tier:3,lg:"西甲"},{id:14,n:"里昂",s:"里昂",rep:76,tier:3,lg:"法甲"},{id:15,n:"本菲卡",s:"本菲卡",rep:77,tier:3,lg:"葡超"},{id:16,n:"阿贾克斯",s:"阿贾克斯",rep:79,tier:3,lg:"荷甲"}];
const YOUTH=[{id:101,n:"拉玛西亚青训营",s:"拉玛西亚",rep:70,tier:4,lg:"青年联赛"},{id:102,n:"拜仁青训学院",s:"拜仁青训",rep:68,tier:4,lg:"青年联赛"},{id:103,n:"曼城青训学院",s:"曼城青训",rep:66,tier:4,lg:"青年联赛"}];
const ac=v=>v>=17?"#22c55e":v>=13?"#84cc16":v>=9?"#eab308":v>=5?"#f97316":"#ef4444";

let G=null,VIEW="create",NT=null;
let CC={name:"",nation:12,pos:"ST"};

function notify(m){clearTimeout(NT);const e=document.getElementById('notif');if(e){e.textContent=m;e.style.display='block';}NT=setTimeout(()=>{if(e)e.style.display='none';},3000);}

function startGame(){
  if(!CC.name.trim()){notify("请输入你的名字！");return;}
  const nation=NATIONS.find(n=>n.id===CC.nation);
  const pos=POS[CC.pos];
  const yc=pick(YOUTH);
  const pa=RI(140,190),ca=RI(35,50);
  G={name:CC.name.trim(),nation,pos:CC.pos,age:16,ca,pa,
    pace:pos.z==="ATK"?RI(8,13):RI(5,10),shot:pos.z==="ATK"?RI(7,12):CC.pos==="GK"?RI(1,4):RI(4,8),
    pass:pos.z==="MID"?RI(8,13):RI(4,9),drib:pos.z==="ATK"||pos.z==="MID"?RI(7,12):RI(3,7),
    def:pos.z==="DEF"?RI(8,13):RI(2,6),phys:RI(5,10),mental:RI(5,10),
    hp:0,stam:85,morale:80,form:70,
    club:yc,clubHist:[{club:yc.n,from:2026,to:null}],
    wage:500,contract:3,
    goals:0,ast:0,apps:0,avgR:0,totR:0,motm:0,
    cGoals:0,cAst:0,cApps:0,cMotm:0,
    awards:[],offers:[],
    year:2026,month:8,week:1,season:1,
    events:[{y:2026,t:`${CC.name} 在${yc.n}开始了自己的足球生涯。一颗新星正在冉冉升起...`,icon:"🌟"}],
    leaguePos:null,retired:false,retireAge:null,
    trainFocus:"balanced",
    teamRole:"youth",managerRel:60,fanPop:10,
    lastMatch:null,pendingChoice:null,
    intCaps:0,intGoals:0,intTeam:false,
    value:50000};
  VIEW="dashboard";render();
}

function calcValue(){const m=G.age<22?1.8:G.age<26?2.2:G.age<29?2:G.age<32?1.2:0.5;G.value=Math.round(G.ca*G.ca*m*R(30,60));}

function weeklyGrowth(){
  const age=G.age;let g=age<=18?1.8:age<=22?1.4:age<=25?0.8:age<=28?0.3:-0.2-(age-29)*0.12;
  if(g>0){
    const gap=Math.max(0,(G.pa-G.ca)/120),tm=G.trainFocus==="balanced"?0.7:0.55,mm=G.apps>0?0.8:0.3,cm=G.club.rep/100;
    G.ca=clamp(G.ca+gap*(mm*(G.form/100)+tm)*g*cm,0,G.pa);
    const gr=(a,v)=>{G[a]=clamp(G[a]+v,1,20);},s=()=>R(0,0.25)*g;
    if(G.trainFocus==="attack"){gr("shot",s());gr("drib",s());}
    else if(G.trainFocus==="defense"){gr("def",s());gr("phys",s());}
    else if(G.trainFocus==="physical"){gr("pace",s());gr("phys",s());}
    else if(G.trainFocus==="technical"){gr("pass",s());gr("drib",s());gr("mental",s());}
    else{["pace","shot","pass","drib","def","phys","mental"].forEach(a=>gr(a,s()*0.5));}
  }else{
    if(age>=30){const d=Math.log(age-28)*0.08;G.pace=clamp(G.pace-d*R(0.3,0.6),1,20);G.phys=clamp(G.phys-d*R(0.2,0.4),1,20);G.stam=clamp(G.stam-d,40,100);if(Math.random()>0.6){G.pass=clamp(G.pass+R(0,0.15),1,20);G.mental=clamp(G.mental+R(0,0.15),1,20);}}
    G.ca=clamp(G.ca+g*0.3,30,200);
  }
  G.stam=clamp(G.stam+R(5,15),0,100);
  if(G.hp>0&&Math.random()>0.4)G.hp=Math.max(0,G.hp-1);
  G.morale=clamp(G.morale+R(-3,3),20,100);
  G.form=clamp(G.form+R(-5,5),20,100);
  calcValue();
}

function simMyMatch(){
  if(G.hp>0){G.lastMatch={played:false,reason:"伤病缺阵"};return;}
  const rc=G.teamRole==="legend"?.95:G.teamRole==="star"?.9:G.teamRole==="starter"?.8:G.teamRole==="squad"?.5:.25;
  let started=Math.random()<rc,subbed=!started&&Math.random()<.4;
  if(!started&&!subbed){G.lastMatch={played:false,reason:"未进入大名单"};return;}
  const pz=POS[G.pos].z;let rating=6,events=[],goals=0,assists=0;
  const pb=(G.ca/200)*(G.form/100)*(G.morale/100)*R(0.7,1.3);rating+=pb*3;
  const chances=started?RI(2,6):RI(1,3);
  for(let i=0;i<chances;i++){
    const roll=Math.random();
    if(pz==="ATK"){const sk=(G.shot+G.drib+G.mental)/60;
      if(roll<sk*.35){goals++;rating+=1.2;events.push({t:"GOAL",txt:`⚽ ${G.name}${pick(["一脚精彩的射门破门得分！","冷静推射入网！","禁区内抢点破门！","远射直挂死角！","灵巧挑射骗过门将！","头球攻门得手！"])}`});}
      else if(roll<sk*.5){assists++;rating+=.6;events.push({t:"ASSIST",txt:`🅰️ ${G.name}${pick(["送出精妙直塞助攻！","漂亮过顶球助攻队友！","突破后横传造成进球！","角球精准找到队友！"])}`});}
      else if(roll<sk*.65){events.push({t:"CHANCE",txt:`💨 ${G.name}${pick(["的射门被门将扑出！","的射门击中门柱！","的单刀球可惜打偏！","的远射稍稍偏出！"])}`});rating+=.2;}
    }else if(pz==="MID"){const sk=(G.pass+G.mental+G.drib)/60;
      if(roll<sk*.2){goals++;rating+=1.5;events.push({t:"GOAL",txt:`⚽ ${G.name}${pick(["中场远射破门！","禁区前沿世界波！","后插上包抄破门！"])}`});}
      else if(roll<sk*.45){assists++;rating+=.6;events.push({t:"ASSIST",txt:`🅰️ ${G.name}${pick(["一脚绝妙过顶球助攻！","精准直塞撕开防线！","漂亮斜长传造成进球！"])}`});}
      else if(roll<sk*.6){events.push({t:"KEY",txt:`🔑 ${G.name}${pick(["控制了比赛节奏","连续两次关键拦截","一次精彩长传转移"])}`});rating+=.3;}
    }else if(pz==="DEF"){const sk=(G.def+G.phys+G.mental)/60;
      if(roll<sk*.08){goals++;rating+=1.8;events.push({t:"GOAL",txt:`⚽ ${G.name}${pick(["角球头球破门！","定位球远射入网！","后卫压上包抄破门！"])}`});}
      else if(roll<sk*.2){assists++;rating+=.5;events.push({t:"ASSIST",txt:`🅰️ ${G.name}${pick(["长传精准助攻！","后场长传发动反击造成进球！"])}`});}
      else if(roll<sk*.5){events.push({t:"DEF",txt:`🛡️ ${G.name}${pick(["关键铲球化解险情！","门线上的救险！","完美盯人让对手毫无机会","头球解围力挽狂澜"])}`});rating+=.4;}
    }else{const sk=(G.def+G.mental+G.phys)/60;
      if(roll<sk*.4){events.push({t:"SAVE",txt:`🧤 ${G.name}${pick(["飞身扑救！精彩绝伦！","神勇扑出单刀球！","连续关键扑救力保球门不失","指尖将球托出横梁！"])}`});rating+=.5;}
    }
    if(Math.random()<.08){events.push({t:"BAD",txt:`😤 ${G.name}${pick(["一次危险传球失误","被对手轻松过掉","出现低级失误","犯规吃到黄牌 🟨"])}`});rating-=.5;}
  }
  if(Math.random()<.04){G.hp=Math.random()>.6?2:1;events.push({t:"INJURY",txt:`🏥 ${G.name}${G.hp===2?"遭遇严重伤病！将缺阵数周":"出现轻微不适，需要观察"}`});rating-=1;}
  rating=clamp(Math.round(rating*10)/10,3,10);
  const isMotm=rating>=8&&Math.random()>.3;
  G.apps++;G.cApps++;G.goals+=goals;G.cGoals+=goals;G.ast+=assists;G.cAst+=assists;
  G.totR+=rating;G.avgR=Math.round(G.totR/G.apps*10)/10;
  if(isMotm){G.motm++;G.cMotm++;}
  G.stam=clamp(G.stam-R(15,30),0,100);G.form=clamp(G.form+(rating-6.5)*5,20,100);
  const ts=G.club.rep/100,os=R(.5,1),tg=Math.round(R(0,3)*ts),og=Math.round(R(0,3)*os);
  const res=tg>og?"胜":tg<og?"负":"平";
  G.lastMatch={played:true,started,subbed,rating,goals,assists,isMotm,events,result:res,teamGoals:tg,oppGoals:og,
    opponent:pick(["皇家社会","毕尔巴鄂","莱斯特城","那不勒斯","勒沃库森","波尔图","马赛","费耶诺德","布鲁日","加拉塔萨雷","顿涅茨克矿工","萨尔茨堡红牛","凯尔特人","哥本哈根"])};
  if(rating>=7.5)G.managerRel=clamp(G.managerRel+R(1,3),0,100);else if(rating<5.5)G.managerRel=clamp(G.managerRel-R(2,5),0,100);
  if(goals>0)G.fanPop=clamp(G.fanPop+R(2,5),0,100);if(isMotm)G.fanPop=clamp(G.fanPop+R(1,3),0,100);
}

function updateRole(){
  if(G.ca>=150&&G.cApps>200)G.teamRole="legend";
  else if(G.ca>=120&&G.apps>10&&G.avgR>=7.2)G.teamRole="star";
  else if(G.ca>=90&&G.apps>5)G.teamRole="starter";
  else if(G.ca>=60)G.teamRole="squad";
  else G.teamRole="youth";
}

function seasonEnd(){
  if(G.goals>=25&&G.club.tier<=2){G.awards.push({y:G.year,n:"联赛金靴"});G.events.push({y:G.year,t:`🏅 ${G.name}凭借${G.goals}粒进球获得联赛金靴奖！`,icon:"🏅"});}
  if(G.goals>=15&&G.club.tier<=2){G.awards.push({y:G.year,n:"联赛最佳球员"});G.events.push({y:G.year,t:`⭐ ${G.name}当选${G.club.lg}年度最佳球员！`,icon:"⭐"});}
  if(G.avgR>=7.8&&G.apps>=20){G.awards.push({y:G.year,n:"赛季最佳阵容"});G.events.push({y:G.year,t:`⭐ ${G.name}入选${G.year}赛季最佳阵容！`,icon:"⭐"});}
  if(G.ca>=160&&G.goals>=20&&G.avgR>=7.5&&G.club.tier===1&&Math.random()>.4){G.awards.push({y:G.year,n:"金球奖"});G.events.push({y:G.year,t:`🏆 ${G.name}荣膺${G.year}年金球奖！站上世界之巅！`,icon:"🏆"});}
  if(G.age<=21&&G.avgR>=7&&G.apps>=15){G.awards.push({y:G.year,n:"最佳年轻球员"});G.events.push({y:G.year,t:`🌟 ${G.name}获得年度最佳年轻球员奖！`,icon:"🌟"});}
  if(!G.intTeam&&G.ca>=80&&G.avgR>=6.8){G.intTeam=true;G.events.push({y:G.year,t:`${G.nation.f} ${G.name}首次入选${G.nation.n}国家队！`,icon:G.nation.f});}
  if(G.intTeam){const c=RI(3,10),ig=["ST","LW","RW","CAM"].includes(G.pos)?RI(0,Math.floor(c/2)):RI(0,2);G.intCaps+=c;G.intGoals+=ig;}
  const contrib=(G.avgR||6)/10;const base=G.club.tier===1?RI(1,4):G.club.tier===2?RI(3,8):G.club.tier===3?RI(5,12):RI(8,16);
  G.leaguePos=clamp(Math.round(base-contrib*3),1,20);
  if(G.leaguePos===1)G.events.push({y:G.year,t:`🏆 ${G.club.n}夺得${G.club.lg}冠军！${G.name}功不可没！`,icon:"🏆"});
  if(G.club.tier<=2&&G.leaguePos<=3&&Math.random()>.6){const r=pick(["四强","决赛","并最终捧杯！🏆"]);G.events.push({y:G.year,t:`🌍 ${G.club.n}在欧冠中闯入了${r}`,icon:"🌍"});if(r.includes("捧杯"))G.awards.push({y:G.year,n:"欧冠冠军"});}
}

function genOffers(){
  G.offers=[];if(G.ca<60||G.age>34)return;
  const n=G.avgR>=7.5?RI(2,4):G.avgR>=6.8?RI(1,3):Math.random()>.5?1:0;
  const el=CLUBS.filter(c=>c.id!==G.club.id&&(G.ca>=100?c.rep>=G.club.rep-5:c.rep>=G.club.rep-15));
  for(let i=0;i<n&&el.length;i++){const c=el.splice(RI(0,el.length-1),1)[0];G.offers.push({club:c,wage:Math.round(G.wage*R(1.3,2.5)),years:RI(2,5),fee:Math.round(G.value*R(.8,1.3))});}
}

function advanceWeek(){
  if(G.retired)return;
  if(Math.random()<.6)simMyMatch();else G.lastMatch=null;
  weeklyGrowth();updateRole();
  G.week++;if(G.week>4){G.week=1;G.month++;if(G.month>12){G.month=1;G.year++;}}
  if(G.month===6&&G.week===1){
    seasonEnd();genOffers();G.pendingChoice="season_end";G.season++;G.age++;
    G.goals=0;G.ast=0;G.apps=0;G.avgR=0;G.totR=0;G.motm=0;
    G.contract--;
    if(G.contract<=0){G.events.push({y:G.year,t:`📋 ${G.name}的合同到期，成为自由球员。`,icon:"📋"});G.pendingChoice="free_agent";}
    if(G.age>=35&&G.ca<80)G.pendingChoice="retire_ask";
    render();return;
  }
  if(Math.random()<.03&&!G.pendingChoice){
    if(pick(["interview","drama"])==="interview")G.pendingChoice="interview";
    else if(G.managerRel<50){G.events.push({y:G.year,t:`😤 ${G.name}与主教练关系紧张，训练中发生争执。`,icon:"😤"});G.managerRel=clamp(G.managerRel-10,0,100);}
  }
  render();
}

function acceptOffer(i){
  const o=G.offers[i];G.clubHist[G.clubHist.length-1].to=G.year;
  G.club=o.club;G.wage=o.wage;G.contract=o.years;
  G.clubHist.push({club:o.club.n,from:G.year,to:null});
  G.events.push({y:G.year,t:`✈️ ${G.name}以${fmt$(o.fee)}转会至${o.club.n}！新的征程开始了。`,icon:"✈️"});
  G.teamRole="squad";G.managerRel=60;G.fanPop=20;G.offers=[];G.pendingChoice=null;render();
}
function stayAtClub(){
  if(G.contract<=0){G.contract=RI(1,3);G.wage=Math.round(G.wage*R(1.1,1.5));G.events.push({y:G.year,t:`📝 ${G.name}与${G.club.n}续约${G.contract}年。`,icon:"📝"});}
  G.offers=[];G.pendingChoice=null;render();
}
function retirePlayer(){
  G.retired=true;G.retireAge=G.age;G.clubHist[G.clubHist.length-1].to=G.year;
  G.events.push({y:G.year,t:`👋 ${G.name}宣布挂靴退役，结束了${G.cApps}场的辉煌生涯。传奇永不落幕。`,icon:"👋"});
  G.pendingChoice=null;VIEW="retire";render();
}
function handleInterview(c){
  if(c==="humble"){G.fanPop=clamp(G.fanPop+5,0,100);G.managerRel=clamp(G.managerRel+3,0,100);G.events.push({y:G.year,t:`🎤 ${G.name}谦虚表示："这都是团队的功劳。"`,icon:"🎤"});}
  else if(c==="bold"){G.fanPop=clamp(G.fanPop+8,0,100);G.managerRel=clamp(G.managerRel-3,0,100);G.events.push({y:G.year,t:`🎤 ${G.name}霸气宣言："我是世界上最好的球员。"`,icon:"🎤"});}
  else{G.managerRel=clamp(G.managerRel+5,0,100);G.events.push({y:G.year,t:`🎤 ${G.name}表达了对主教练的信任与支持。`,icon:"🎤"});}
  G.pendingChoice=null;render();
}

    h+=`<div class="sec mt16">📰 大事记</div><div class="timeline" style="margin-left:8px">`;
    G.events.slice().reverse().forEach(e=>{h+=`<div class="tl-item"><div class="tl-dot"></div><div class="sm" style="padding-left:10px"><span class="dim xs">${e.y}</span><div class="mt4" style="line-height:1.5">${e.icon||""} ${esc(e.t)}</div></div></div>`;});

  // TRAINING
  if(VIEW==="train"){
    h+=`<div class="anim"><div class="sec">🏋️ 训练重点</div><div class="dim sm mb10">选择训练方向侧重提升对应属性。年轻球员成长更快。</div><div class="choice-grid">`;

      const on=G.trainFocus===o.id;h+=`<div class="choice-btn" style="${on?'border-color:var(--accent);background:var(--glow)':''}" onclick="G.trainFocus='${o.id}';render()"><div class="choice-title">${o.icon} ${o.n} ${on?'<span class="accent">✓ 当前</span>':''}</div><div class="choice-desc">${o.d}</div></div>`;
    });
    h+=`</div><div class="sec mt24">📊 当前属性</div><div class="card"><div class="g2">${aB("速度",G.pace)}${aB("射门",G.shot)}${aB("传球",G.pass)}${aB("盘带",G.drib)}${aB("防守",G.def)}${aB("体能",G.phys)}${aB("心理",G.mental)}</div></div>`;
    const gl=G.age<=18?"🚀 爆发成长期":G.age<=22?"📈 快速成长期":G.age<=25?"📊 稳定成长期":G.age<=28?"⏸ 巅峰维持期":"📉 能力衰退期";
    h+=`<div class="card mt12 sm"><div class="fb"><span class="dim">成长阶段</span><span class="bold">${gl}</span></div><div class="fb mt4"><span class="dim">成长空间</span><span class="accent bold">${Math.round(G.pa-G.ca)} 点</span></div></div></div>`;
  }

  // RETIRE
  if(VIEW==="retire"){
    h+=`<div class="anim center"><div style="font-size:60px;margin-top:30px">👋</div><div class="logo" style="font-size:20px;margin-top:12px">传奇谢幕</div><div class="dim mt8">${esc(G.name)} · ${G.retireAge}岁退役 · ${G.year}年</div>`;
    h+=`<div class="card mt24" style="text-align:left"><div class="bold mb6">生涯总览</div><div class="sg" style="margin-top:0">${[{l:"总出场",v:G.cApps,i:"📊"},{l:"总进球",v:G.cGoals,i:"⚽"},{l:"总助攻",v:G.cAst,i:"🅰️"},{l:"全场最佳",v:G.cMotm,i:"🏅"},{l:"国际出场",v:G.intCaps,i:G.nation.f},{l:"荣誉",v:G.awards.length,i:"🏆"}].map(s=>`<div class="sb"><div class="sb-i">${s.i}</div><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div></div>`;
    h+=`<div class="card mt12" style="text-align:left"><div class="bold mb6 sm">效力俱乐部</div>`;G.clubHist.forEach(c=>{h+=`<div class="fb sm" style="padding:4px 0"><span class="bold">${esc(c.club)}</span><span class="dim">${c.from}-${c.to||G.year}</span></div>`;});h+=`</div>`;
    if(G.awards.length){h+=`<div class="card mt12" style="text-align:left"><div class="bold mb6 sm">🏆 荣誉</div>`;G.awards.forEach(a=>{h+=`<div class="sm gold" style="padding:3px 0">${a.n} (${a.y})</div>`;});h+=`</div>`;}
    let leg=G.cApps>=400&&G.awards.length>=5?"⭐⭐⭐⭐⭐ 一代球王":G.cApps>=300&&G.awards.length>=3?"⭐⭐⭐⭐ 超级巨星":G.cApps>=200&&G.awards.length>=1?"⭐⭐⭐ 世界级球星":G.cApps>=100?"⭐⭐ 优秀球员":"⭐ 职业球员";
    h+=`<div class="card mt12 gl center"><div class="sm dim">传奇评级</div><div class="gold bold" style="font-size:18px;margin-top:6px">${leg}</div></div>`;
    h+=`<button class="btn btn-p btn-lg mt24" onclick="VIEW='create';CC={name:'',nation:12,pos:'ST'};G=null;render()">🔄 重新开始</button></div>`;
  }

  h+=`</div>`;document.getElementById('app').innerHTML=h;
}

function renderChoice(){
  let h=`<div class="anim">`;
  if(G.pendingChoice==="season_end"){
    h+=`<div class="card gl center"><div style="font-size:36px">📅</div><div class="bold mt8" style="font-size:16px">第${G.season-1}赛季结束</div>`;
    if(G.leaguePos)h+=`<div class="sm mt4">${G.club.n} · ${G.club.lg} 第${G.leaguePos}名</div>`;
    h+=`<div class="sm dim mt4">${G.age}岁 · CA ${Math.round(G.ca)} · 身价 ${fmt$(G.value)}</div></div>`;
    if(G.offers.length){h+=`<div class="sec mt16">📨 转会邀约</div>`;G.offers.forEach((o,i)=>{h+=`<div class="card ck" onclick="acceptOffer(${i})"><div class="fb"><div><div class="bold">${o.club.n}</div><div class="dim xs">${o.club.lg} · 声望 ${o.club.rep}</div></div><div style="text-align:right"><div class="accent bold">${fmt$(o.wage)}/周</div><div class="xs dim">${o.years}年合同</div></div></div></div>`;});}
    h+=`<button class="btn btn-full mt12" onclick="stayAtClub()">${G.contract>0?`留在${G.club.s}继续征战`:`与${G.club.s}续约`}</button>`;
    if(G.age>=32)h+=`<button class="btn btn-d btn-full mt8" onclick="retirePlayer()">👋 宣布退役</button>`;
  }else if(G.pendingChoice==="free_agent"){
    h+=`<div class="card gl center"><div style="font-size:36px">📋</div><div class="bold mt8">合同到期 — 自由球员</div><div class="sm dim mt4">选择新的俱乐部或续约</div></div>`;
    if(G.offers.length){h+=`<div class="sec mt12">📨 邀约</div>`;G.offers.forEach((o,i)=>{h+=`<div class="card ck" onclick="acceptOffer(${i})"><div class="fb"><div><div class="bold">${o.club.n}</div><div class="dim xs">${o.club.lg}</div></div><div style="text-align:right"><div class="accent bold">${fmt$(o.wage)}/周</div><div class="xs dim">${o.years}年</div></div></div></div>`;});}
    h+=`<button class="btn btn-full mt8" onclick="stayAtClub()">与${G.club.s}续约</button>`;
    if(G.age>=30)h+=`<button class="btn btn-d btn-full mt8" onclick="retirePlayer()">👋 退役</button>`;
  }else if(G.pendingChoice==="retire_ask"){
    h+=`<div class="card gl center"><div style="font-size:36px">🤔</div><div class="bold mt8">是否退役？</div><div class="sm dim mt4">你已经${G.age}岁，身体状况开始下滑...</div></div>`;
    h+=`<button class="btn btn-p btn-full mt12" onclick="G.pendingChoice=null;render()">💪 继续踢！</button><button class="btn btn-d btn-full mt8" onclick="retirePlayer()">👋 光荣退役</button>`;
  }else if(G.pendingChoice==="interview"){
    h+=`<div class="card center"><div style="font-size:32px">🎤</div><div class="bold mt8">赛后采访</div><div class="sm dim mt4">记者问你对近期表现的看法</div></div><div class="choice-grid">`;
    h+=`<div class="choice-btn" onclick="handleInterview('humble')"><div class="choice-title">🙏 谦虚回应</div><div class="choice-desc">"这都是团队的功劳。" (+球迷好感 +教练信任)</div></div>`;
    h+=`<div class="choice-btn" onclick="handleInterview('bold')"><div class="choice-title">🔥 霸气宣言</div><div class="choice-desc">"我是世界最好的球员。" (+球迷人气 -教练关系)</div></div>`;
    h+=`<div class="choice-btn" onclick="handleInterview('coach')"><div class="choice-title">🤝 支持教练</div><div class="choice-desc">"教练的安排非常完美。" (+教练信任)</div></div></div>`;
  }
  h+=`</div>`;return h;
}

window.CC=CC;window.advanceWeek=advanceWeek;window.acceptOffer=acceptOffer;window.stayAtClub=stayAtClub;
window.retirePlayer=retirePlayer;window.handleInterview=handleInterview;window.startGame=startGame;window.notify=notify;
render();
</script>
</body>
</html>
