function notify(m){clearTimeout(NT);const e=document.getElementById('notif');if(e){e.textContent=m;e.style.display='block';}NT=setTimeout(()=>{const e2=document.getElementById('notif');if(e2)e2.style.display='none';},2500);}
function saveGame(){if(!G)return;try{localStorage.setItem('gp_save',JSON.stringify(G));notify("💾 已保存");}catch(e){notify("失败");}}
function loadGame(){try{const s=localStorage.getItem('gp_save');if(s){G=JSON.parse(s);VIEW="dashboard";render();notify("📂 已加载");}else notify("无存档");}catch(e){notify("失败");}}

function leagueOpp(){return pick(LG_OPP[G.club.lg]||LG_OPP["青年联赛"]);}
function genNextOpp(){return{opp:leagueOpp(),type:pick(["league","league","league","cup","derby"])};}
function genRival(){return{name:pick(["马丁内斯","席尔瓦","穆勒","史密斯","迪亚斯","罗西","德容","姆巴佩"]),ca:Math.round(G.ca*R(.85,1.15)),goals:RI(0,5),nation:pick(NATIONS)};}

function checkEndorsements(){
  if(!G.endorse)G.endorse=[];
  ENDORSEMENTS.forEach(e=>{if(G.ca>=e.req&&!G.endorse.find(x=>x.n===e.n)&&Math.random()>.6){G.endorse.push({n:e.n,val:e.val,y:G.year});G.wage+=e.val;G.events.push({y:G.year,t:`💰 签下${e.n}代言！+${fmt$(e.val)}/周`,icon:"💰"});}});
}

// INIT
function startGame(){
  if(!CC.name.trim()){notify("请输入名字");return;}
  const nation=NATIONS.find(n=>n.id===CC.nation),pos=POS[CC.pos],yc=YOUTH[CC.yci];
  const paR=[[165,200],[148,185],[120,165]][CC.diff],pa=RI(paR[0],paR[1]),ca=RI(35,50);
  G={name:CC.name.trim(),nation,pos:CC.pos,age:16,ca,pa,
    pace:pos.z==="ATK"?RI(8,13):RI(5,10),shot:pos.z==="ATK"?RI(7,12):CC.pos==="GK"?RI(1,4):RI(4,8),
    pass:pos.z==="MID"?RI(8,13):RI(4,9),drib:pos.z==="ATK"||pos.z==="MID"?RI(7,12):RI(3,7),
    def:pos.z==="DEF"?RI(8,13):RI(2,6),phys:RI(5,10),mental:RI(5,10),
    hp:0,hpW:0,stam:85,morale:80,form:70,
    club:yc,clubHist:[{c:yc.n,f:2026,t:null}],wage:500,contract:3,
    goals:0,ast:0,apps:0,avgR:0,totR:0,motm:0,
    cGoals:0,cAst:0,cApps:0,cMotm:0,cHatTricks:0,
    awards:[],offers:[],year:2026,month:8,week:1,season:1,
    events:[{y:2026,t:`${CC.name.trim()}在${yc.n}开始了足球生涯。`,icon:"🌟"}],
    leaguePos:null,retired:false,retireAge:null,
    trainFocus:"balanced",teamRole:"youth",isCaptain:false,
    managerRel:60,fanPop:10,
    lastMatch:null,matchLog:[],seasonLog:[],caHistory:[{a:16,c:ca}],
    pendingChoice:null,
    intCaps:0,intGoals:0,intTeam:false,
    value:50000,consecL:0,consecW:0,bestStreak:0,
    transferReq:false,totalEarnings:0,savings:0,
    worldCupW:0,worldCupA:0,
    rival:null,endorse:[],_ms:{},
    postRetire:null,nextOpp:null, // 修改点1：在此处初始化为null避免报错
    // LIFESTYLE
    owned:[],// ids of purchased items
    spendLog:[],// {name,price,year}
    totalSpent:0,
    diff:CC.diff,
  };
  G.nextOpp=genNextOpp(); // 修改点2：在G对象初始化完成后生成对手
  G.rival=genRival();
  VIEW="dashboard";render();
}

// CORE
function calcValue(){const m=G.age<22?1.8:G.age<26?2.2:G.age<29?2:G.age<32?1.2:0.5;G.value=Math.round(G.ca*G.ca*m*R(30,60));}
function updateRole(){
  if(G.ca>=155&&G.cApps>200)G.teamRole="legend";
  else if(G.ca>=125&&G.apps>10&&G.avgR>=7.2)G.teamRole="star";
  else if(G.ca>=90&&G.apps>5)G.teamRole="starter";
  else if(G.ca>=60)G.teamRole="squad";
  else G.teamRole="youth";
  if(!G.isCaptain&&G.teamRole==="star"&&G.managerRel>=75&&G.cApps>=80&&Math.random()>.7){G.isCaptain=true;G.events.push({y:G.year,t:`©️ 成为队长！`,icon:"©️"});}
}

function weeklyGrowth(){
  const age=G.age;let g=age<=18?1.8:age<=22?1.4:age<=25?0.8:age<=28?0.3:-0.2-(age-29)*0.12;
  if(g>0){
    const gap=Math.max(0,(G.pa-G.ca)/120),tm=G.trainFocus==="balanced"?0.7:0.55,mm=G.apps>0?0.8:0.3,cm=G.club.rep/100;
    G.ca=clamp(G.ca+gap*(mm*(G.form/100)+tm)*g*cm,0,G.pa);
    const gr=(a,v)=>{G[a]=clamp(G[a]+v,1,20);},s=()=>R(0,0.25)*g;
    if(G.trainFocus==="attack"){gr("shot",s());gr("drib",s());}
    else if(G.trainFocus==="defense"){gr("def",s());gr("phys",s());}
    else if(G.trainFocus==="physical"){gr("pace",s());gr("phys",s());}
    else if(G.trainFocus==="technical"){gr("pass",s());gr("drib",s());gr("mental",s());}
    else{["pace","shot","pass","drib","def","phys","mental"].forEach(a=>gr(a,s()*0.5));}
  }else{
    if(age>=30){const d=Math.log(age-28)*0.08;G.pace=clamp(G.pace-d*R(.3,.6),1,20);G.phys=clamp(G.phys-d*R(.2,.4),1,20);if(Math.random()>.6){G.pass=clamp(G.pass+R(0,.15),1,20);G.mental=clamp(G.mental+R(0,.15),1,20);}}
    G.ca=clamp(G.ca+g*.3,30,200);
  }
  G.stam=clamp(G.stam+R(5,15),0,100);
  if(G.hp>0){G.hpW--;if(G.hpW<=0){G.hp=0;G.hpW=0;if(G.cApps>5)G.events.push({y:G.year,t:`💪 伤愈复出！`,icon:"💪"});}}
  G.morale=clamp(G.morale+R(-3,3),20,100);G.form=clamp(G.form+R(-4,4),20,100);
  G.totalEarnings+=G.wage;G.savings+=G.wage;
  calcValue();
  if(G.rival)G.rival.ca=clamp(G.rival.ca+R(-.3,.5),40,195);
}

function simMatch(isDerby,isCup,intMatch){
  if(G.hp>0){G.lastMatch={played:false,reason:"伤病缺阵"};return null;}
  const rc=G.teamRole==="legend"?0.95:G.teamRole==="star"?0.9:G.teamRole==="starter"?0.82:G.teamRole==="squad"?0.5:0.22; // 修改点3：补齐小数前面的0，避免部分解析器报错
  let started=Math.random()<rc,subbed=!started&&Math.random()<.4;
  if(!started&&!subbed){G.lastMatch={played:false,reason:"未进大名单"};return null;}
  const tacMod=TACTIC==="aggressive"?{a:1.2,d:.85,i:1.3}:TACTIC==="defensive"?{a:.75,d:1.2,i:.8}:{a:1,d:1,i:1};
  const pz=POS[G.pos].z;let rating=6,events=[],goals=0,assists=0,ycc=0;
  const pb=(G.ca/200)*(G.form/100)*(G.morale/100)*R(.7,1.3);
  if(isDerby)rating+=.3;rating+=pb*3;
  const chances=started?RI(2,7):RI(1,3);
  const usedM=new Set();const rm=()=>{let m;do{m=RI(1,90);}while(usedM.has(m)&&usedM.size<85);usedM.add(m);return m;};

  for(let i=0;i<chances;i++){
    const roll=Math.random(),min=rm();
    if(pz==="ATK"){const sk=(G.shot+G.drib+G.mental)/60*tacMod.a;
      if(roll<sk*.35){goals++;rating+=1.2;events.push({t:"GOAL",min,txt:`⚽${G.name}${pick(["精彩破门！","冷静推射！","抢点破门！","远射死角！","挑射入网！","头球得分！","凌空抽射！"])}`});}
      else if(roll<sk*.5){assists++;rating+=.6;events.push({t:"AST",min,txt:`🅰️${G.name}${pick(["直塞助攻！","过顶球助攻！","横传造成进球！"])}`});}
      else if(roll<sk*.65){events.push({t:"CHA",min,txt:`💨${G.name}${pick(["射门被扑！","击中门柱！","单刀打偏！"])}`});rating+=.2;}
    }else if(pz==="MID"){const sk=(G.pass+G.mental+G.drib)/60*tacMod.a;
      if(roll<sk*.2){goals++;rating+=1.5;events.push({t:"GOAL",min,txt:`⚽${G.name}${pick(["远射破门！","世界波！","后插上破门！"])}`});}
      else if(roll<sk*.45){assists++;rating+=.6;events.push({t:"AST",min,txt:`🅰️${G.name}${pick(["过顶球助攻！","直塞撕防线！","斜传造进球！"])}`});}
      else if(roll<sk*.6){events.push({t:"KEY",min,txt:`🔑${G.name}${pick(["控制节奏","关键拦截","精彩长传"])}`});rating+=.3;}
    }else if(pz==="DEF"){const sk=(G.def+G.phys+G.mental)/60*tacMod.d;
      if(roll<sk*.08){goals++;rating+=1.8;events.push({t:"GOAL",min,txt:`⚽${G.name}${pick(["角球头球！","定位球远射！","压上破门！"])}`});}
      else if(roll<sk*.2){assists++;rating+=.5;events.push({t:"AST",min,txt:`🅰️${G.name}长传助攻！`});}
      else if(roll<sk*.5){events.push({t:"DEF",min,txt:`🛡️${G.name}${pick(["关键铲球！","门线救险！","完美盯人","飞身封堵！"])}`});rating+=.4;}
    }else{const sk=(G.def+G.mental+G.phys)/60*tacMod.d;
      if(roll<sk*.4){events.push({t:"SAVE",min,txt:`🧤${G.name}${pick(["飞身扑救！","扑出单刀！","连续扑救！"])}`});rating+=.5;}
    }
    if(Math.random()<.07){const m2=rm();if(Math.random()<.3){ycc++;events.push({t:"YEL",min:m2,txt:`🟨${G.name}黄牌！`});rating-=.3;}else{events.push({t:"BAD",min:m2,txt:`😤${G.name}${pick(["传球失误","被过掉","低级失误"])}`});rating-=.5;}}
  }
  if(ycc>=2){events.push({t:"RED",min:rm(),txt:`🟥两黄一红！`});rating-=2;}
  if(Math.random()<.04*tacMod.i){const sv=Math.random()>.6;G.hp=sv?2:1;G.hpW=sv?RI(4,10):RI(1,3);events.push({t:"INJ",min:rm(),txt:`🏥${sv?"重伤！缺"+G.hpW+"周":"轻伤"+G.hpW+"周"}`});rating-=1;}
  events.sort((a,b)=>a.min-b.min);
  rating=clamp(Math.round(rating*10)/10,3,10);
  const isMotm=rating>=8&&Math.random()>.3;
  G.apps++;G.cApps++;G.goals+=goals;G.cGoals+=goals;G.ast+=assists;G.cAst+=assists;
  G.totR+=rating;G.avgR=Math.round(G.totR/G.apps*10)/10;
  if(isMotm){G.motm++;G.cMotm++;}
  G.stam=clamp(G.stam-R(15,30),0,100);G.form=clamp(G.form+(rating-6.5)*5,20,100);
  if(goals>=3){G.cHatTricks++;events.push({t:"HAT",min:91,txt:`🎩帽子戏法！${goals}球！`});G.events.push({y:G.year,t:`🎩 帽子戏法！`,icon:"🎩"});}
  const ts=G.club.rep/100*(intMatch?.8:1),os=R(.4,1);
  let tg=goals+Math.round(R(0,2.5)*ts),og=Math.round(R(0,3)*os);
  if(tg<=og&&rating>=8&&Math.random()>.5)tg=og+1;
  const result=tg>og?"胜":tg<og?"负":"平";
  if(result==="胜"){G.consecW++;G.consecL=0;if(G.consecW>G.bestStreak)G.bestStreak=G.consecW;}else if(result==="负"){G.consecL++;G.consecW=0;}else{G.consecW=0;G.consecL=0;}
  if(result==="胜"&&goals>0&&tg-og===1&&Math.random()>.4){events.push({t:"CLUTCH",min:92,txt:`🔥绝杀！`});G.events.push({y:G.year,t:`🔥 绝杀！`,icon:"🔥"});G.fanPop=clamp(G.fanPop+5,0,100);}
  if(G.consecL>=3&&!G._lN){G.events.push({y:G.year,t:`📉 ${G.consecL}连败...`,icon:"📉"});G.morale=clamp(G.morale-10,20,100);G._lN=true;}
  if(G.consecW>=5&&!G._wN){G.events.push({y:G.year,t:`🔥 ${G.consecW}连胜！`,icon:"🔥"});G._wN=true;}
  const opp=intMatch?pick(INT_OPP.filter(x=>x!==G.nation.n)):G.nextOpp?.opp||leagueOpp();
  G.lastMatch={played:true,started,subbed,rating,goals,assists,isMotm,events,result,tg,og,opp,isDerby,isCup,intMatch};
  G.matchLog.push({r:rating,g:goals,a:assists,res:result,opp,tg,og,motm:isMotm,type:intMatch?"int":isCup?"cup":isDerby?"derby":"lg"});
  if(rating>=7.5)G.managerRel=clamp(G.managerRel+R(1,3),0,100);else if(rating<5.5)G.managerRel=clamp(G.managerRel-R(2,5),0,100);
  if(goals>0)G.fanPop=clamp(G.fanPop+R(1.5,4),0,100);if(isMotm)G.fanPop=clamp(G.fanPop+R(1,3),0,100);
  // milestones
  const mck=[[G.cApps===1,"🎒 首秀！"],[G.cGoals===1,"⚽ 首球！"],[G.cApps===100,"💯 百场！"],[G.cGoals===100,"💯 百球！"],[G.cApps===500,"🐐 500场！"]];
  mck.forEach(([c,t])=>{if(c&&!G._ms[t]){G._ms[t]=1;G.events.push({y:G.year,t,icon:t[0]});}});
  if(G.rival)G.rival.goals+=RI(0,1);
  G.nextOpp=genNextOpp();
  return G.lastMatch;
}

function seasonEnd(){
  G.caHistory.push({a:G.age,c:Math.round(G.ca)});
  const atk=["ST","LW","RW","CAM"].includes(G.pos);
  if(G.goals>=25&&G.club.t<=2){G.awards.push({y:G.year,n:"联赛金靴"});G.events.push({y:G.year,t:`🏅 ${G.goals}球金靴！`,icon:"🏅"});}
  if(G.avgR>=7.8&&G.apps>=20){G.awards.push({y:G.year,n:"最佳阵容"});G.events.push({y:G.year,t:`⭐ 入选最佳！`,icon:"⭐"});}
  if(G.ca>=160&&((atk&&G.goals>=18)||(!atk&&G.avgR>=7.5))&&G.club.t===1&&Math.random()>.35){G.awards.push({y:G.year,n:"金球奖"});G.events.push({y:G.year,t:`🏆 金球奖！`,icon:"🏆"});}
  if(G.age<=21&&G.avgR>=7&&G.apps>=15){G.awards.push({y:G.year,n:"最佳新秀"});G.events.push({y:G.year,t:`🌟 最佳新秀！`,icon:"🌟"});}
  if(!G.intTeam&&G.ca>=80&&G.avgR>=6.8){G.intTeam=true;G.events.push({y:G.year,t:`${G.nation.f} 入选国家队！`,icon:G.nation.f});}
  if(G.intTeam){G.intCaps+=RI(4,12);G.intGoals+=RI(0,atk?6:2);}
  const base=G.club.t===1?RI(1,4):G.club.t===2?RI(3,8):G.club.t===3?RI(5,12):RI(8,16);
  G.leaguePos=clamp(Math.round(base-(G.avgR||6)/10*3),1,20);
  if(G.leaguePos===1){G.awards.push({y:G.year,n:`${G.club.lg}冠军`});G.events.push({y:G.year,t:`🏆 联赛冠军！`,icon:"🏆"});}
  if(G.club.t<=2&&G.leaguePos<=3){const r=R(0,1);if(r>.75){G.awards.push({y:G.year,n:"欧冠冠军"});G.events.push({y:G.year,t:`🏆 欧冠！`,icon:"🏆"});}else if(r>.4)G.events.push({y:G.year,t:`🌍 欧冠${pick(["决赛","四强"])}`,icon:"🌍"});}
  if(G.year%4===2&&G.intTeam){G.worldCupA++;const ns=G.nation.id<=3?.8:G.nation.id<=9?.6:.35;if(Math.random()<(ns+G.ca/200*.2)*.25){G.worldCupW++;G.awards.push({y:G.year,n:"世界杯冠军"});G.events.push({y:G.year,t:`🌍🏆 世界杯！`,icon:"🌍"});}else G.events.push({y:G.year,t:`🌍 世界杯${pick(["出局","十六强","八强","四强"])}`,icon:"🌍"});}
  checkEndorsements();
  G.seasonLog.push({s:G.season,g:G.goals,a:G.ast,ap:G.apps,ar:G.avgR,cl:G.club.s,p:G.leaguePos,ca:Math.round(G.ca)});
  if(G.rival){G.rival.ca=clamp(G.rival.ca+R(-2,3),40,195);G.rival.goals=RI(5,30);}
}

function genOffers(){
  G.offers=[];if(G.ca<60||G.age>34)return;
  const n=G.transferReq?RI(3,5):G.avgR>=7.5?RI(2,4):RI(0,2);
  const el=CLUBS.filter(c=>c.id!==G.club.id&&c.rep>=G.club.rep-15);
  for(let i=0;i<n&&el.length;i++){const c=el.splice(RI(0,el.length-1),1)[0];G.offers.push({club:c,wage:Math.round(G.wage*R(1.2,2.8)),years:RI(2,5),fee:Math.round(G.value*R(.8,1.3))});}
  G.transferReq=false;
}

function doAdvance(){
  if(G.retired||G.pendingChoice)return false;
  const hm=Math.random()<.6,isDerby=hm&&G.nextOpp?.type==="derby",isCup=hm&&G.nextOpp?.type==="cup";
  if(hm)simMatch(isDerby,isCup,false);else G.lastMatch=null;
  weeklyGrowth();updateRole();
  G.week++;if(G.week>4){G.week=1;G.month++;if(G.month>12){G.month=1;G.year++;}}
  if(Math.random()<.025&&!G.pendingChoice){
    const et=pick(["interview","interview","intl","wage"]);
    if(et==="interview")G.pendingChoice="interview";
    else if(et==="intl"&&G.intTeam&&G.month>=3&&G.month<=4)G.pendingChoice="intl";
    else if(et==="wage"&&G.teamRole!=="youth"&&G.avgR>=7&&Math.random()>.5)G.pendingChoice="wage";
  }
  if(G.month===6&&G.week===1){
    seasonEnd();genOffers();G.pendingChoice="season_end";G.season++;G.age++;
    G.goals=0;G.ast=0;G.apps=0;G.avgR=0;G.totR=0;G.motm=0;G.matchLog=[];
    G.consecL=0;G.consecW=0;G._lN=false;G._wN=false;
    G.contract--;
    if(G.contract<=0){G.events.push({y:G.year,t:`📋 合同到期`,icon:"📋"});G.pendingChoice="free_agent";}
    if(G.age>=35&&G.ca<80)G.pendingChoice="retire_ask";
    return false;
  }
  return !G.pendingChoice;
}

function advanceWeek(){doAdvance();render();}
function advance4(){let i=0;while(i<4&&doAdvance())i++;render();}
function simSeason(){let s=200;while(s-->0&&doAdvance());render();}
function acceptOffer(i){const o=G.offers[i];G.clubHist[G.clubHist.length-1].t=G.year;G.club=o.club;G.wage=o.wage;G.contract=o.years;G.clubHist.push({c:o.club.n,f:G.year,t:null});G.events.push({y:G.year,t:`✈️ 转会${o.club.n}！`,icon:"✈️"});G.teamRole="squad";G.managerRel=60;G.fanPop=20;G.isCaptain=false;G.offers=[];G.pendingChoice=null;G.nextOpp=genNextOpp();render();}
function stayAtClub(){if(G.contract<=0){G.contract=RI(1,3);G.wage=Math.round(G.wage*R(1.1,1.5));G.events.push({y:G.year,t:`📝 续约${G.contract}年`,icon:"📝"});}G.offers=[];G.pendingChoice=null;render();}
function retirePlayer(){G.retired=true;G.retireAge=G.age;G.clubHist[G.clubHist.length-1].t=G.year;G.events.push({y:G.year,t:`👋 退役。${G.cApps}场。`,icon:"👋"});G.pendingChoice="post_retire";render();}
function handleInterview(c){if(c==="h"){G.fanPop=clamp(G.fanPop+5,0,100);G.managerRel=clamp(G.managerRel+3,0,100);}else if(c==="b"){G.fanPop=clamp(G.fanPop+8,0,100);G.managerRel=clamp(G.managerRel-3,0,100);}else G.managerRel=clamp(G.managerRel+5,0,100);G.pendingChoice=null;render();}
function handleIntl(c){if(c==="play")simMatch(false,false,true);G.pendingChoice=null;render();}
function requestTransfer(){G.transferReq=true;G.managerRel=clamp(G.managerRel-15,0,100);notify("已申请转会");render();}
function handleWage(c){if(c==="ask"){if(Math.random()<.6+G.managerRel/200){G.wage=Math.round(G.wage*R(1.15,1.4));notify("加薪成功！"+fmt$(G.wage)+"/周");}else{G.managerRel=clamp(G.managerRel-5,0,100);notify("被拒绝");}}G.pendingChoice=null;render();}
function choosePostRetire(c){G.postRetire=c;G.pendingChoice=null;VIEW="retire";render();}

// SHOP
function buyItem(id){
  const item=SHOP.find(x=>x.id===id);
  if(!item||G.savings<item.price||G.owned.includes(id))return;
  G.savings-=item.price;G.totalSpent+=item.price;G.owned.push(id);
  G.morale=clamp(G.morale+item.morale,20,100);G.fanPop=clamp(G.fanPop+item.fanPop,0,100);
  G.events.push({y:G.year,t:`🛒 购入${item.name}！${fmt$(item.price)}`,icon:item.icon});
  notify(`${item.icon} 已购入 ${item.name}！`);render();
}
function spendOn(id){
  const item=SPEND.find(x=>x.id===id);
  if(!item||G.savings<item.price)return;
  G.savings-=item.price;G.totalSpent+=item.price;
  G.spendLog.push({n:item.name,p:item.price,y:G.year});
  if(item.gamble){
    // gambling: 40% chance to win 2x, 60% lose
    if(Math.random()<.4){
      const win=Math.round(item.price*R(1.5,3));
      G.savings+=win;
      G.morale=clamp(G.morale+8,20,100);
      notify(`🎰 赢了！${fmt$(win)}`);
      G.events.push({y:G.year,t:`🎰 赌场大赢${fmt$(win)}！`,icon:"🎰"});
    }else{
      G.morale=clamp(G.morale-5,20,100);
      notify(`🎰 输了 ${fmt$(item.price)}`);
      G.events.push({y:G.year,t:`🎰 赌场输了${fmt$(item.price)}...`,icon:"🎰"});
    }
  }else{
    G.morale=clamp(G.morale+item.morale,20,100);G.fanPop=clamp(G.fanPop+item.fanPop,0,100);
    notify(`${item.icon} ${item.name}！`);
  }
  render();
}

    h+=`<div class="${aC}"><div class="sec">📖 履历</div><div class="card">`;G.clubHist.forEach(c=>{h+=`<div class="fb xxs" style="padding:3px 0;border-bottom:1px solid var(--border)"><span class="bold">${esc(c.c)}</span><span class="dim">${c.f}${c.t?'-'+c.t:'-至今'}</span></div>`;});h+=`</div>`;
    if(G.awards.length){h+=`<div class="sec mt12">🏆 荣誉 (${G.awards.length})</div><div class="card">`;G.awards.forEach(a=>{h+=`<div class="xxs gold">${a.n} <span class="dim">${a.y}</span></div>`;});h+=`</div>`;}
    h+=`<div class="sec mt12">📰 大事记</div><div class="tl" style="margin-left:6px">`;G.events.slice(-25).reverse().forEach(e=>{h+=`<div class="tl-i"><div class="tl-d"></div><div class="xxs" style="padding-left:8px"><span class="dim">${e.y}</span> ${e.icon||""} ${esc(e.t)}</div></div>`;});h+=`</div></div>`;
  }

  // TRAINING
  if(VIEW==="train"){
    h+=`<div class="${aC}"><div class="sec">🏋️ 训练</div><div class="cg">`;
    [{id:"balanced",n:"均衡",d:"全面",icon:"⚖️"},{id:"attack",n:"进攻",d:"射门+盘带",icon:"⚽"},{id:"technical",n:"技术",d:"传球+心理",icon:"🎯"},{id:"physical",n:"体能",d:"速度+体能",icon:"💪"},{id:"defense",n:"防守",d:"防守+体能",icon:"🛡️"}].forEach(o=>{const on=G.trainFocus===o.id;h+=`<div class="cb" style="${on?'border-color:var(--accent);background:var(--glow)':''}" onclick="G.trainFocus='${o.id}';render()"><div class="cb-t">${o.icon} ${o.n} ${on?'<span class="accent">✓</span>':''}</div><div class="cb-d">${o.d}</div></div>`;});
    h+=`</div><div class="sec mt12">属性</div><div class="card"><div class="g2">${aB("速度",G.pace)}${aB("射门",G.shot)}${aB("传球",G.pass)}${aB("盘带",G.drib)}${aB("防守",G.def)}${aB("体能",G.phys)}${aB("心理",G.mental)}</div></div>`;
    const gl=G.age<=18?"🚀爆发":G.age<=22?"📈快速":G.age<=25?"📊稳定":G.age<=28?"⏸巅峰":"📉衰退";
    h+=`<div class="card xxs"><div class="fb"><span class="dim">阶段</span><span class="bold">${gl}</span></div><div class="fb mt4"><span class="dim">空间</span><span class="accent bold">${Math.round(G.pa-G.ca)}</span></div><div class="fb mt4"><span class="dim">体能</span><span>${Math.round(G.stam)}</span></div><div class="fb mt4"><span class="dim">健康</span><span>${G.hp===0?"✅":"🤕"+G.hpW+"周"}</span></div></div></div>`;
  }

  // RETIRE
  if(VIEW==="retire"){
    h+=`<div class="${aC} center"><div style="font-size:48px;margin-top:20px">👋</div><div class="logo" style="font-size:18px;margin-top:8px">传奇谢幕</div><div class="dim xxs mt4">${esc(G.name)}·${G.retireAge}岁·${G.year}</div>`;
    h+=`<div class="card mt12" style="text-align:left"><div class="sg" style="margin:0">${[{l:"出场",v:G.cApps},{l:"进球",v:G.cGoals},{l:"助攻",v:G.cAst},{l:"🏅",v:G.cMotm},{l:"🎩",v:G.cHatTricks},{l:"🏆",v:G.awards.length},{l:"🌍",v:G.intCaps},{l:"💰",v:fmt$(G.totalEarnings)}].map(s=>`<div class="sb"><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div></div>`;
    if(G.owned.length){h+=`<div class="card mt6" style="text-align:left"><div class="bold xxs mb4">🏠 资产</div>`;G.owned.forEach(id=>{const it=SHOP.find(x=>x.id===id);if(it)h+=`<div class="xxs">${it.icon} ${it.name}</div>`;});h+=`</div>`;}
    if(G.awards.length){h+=`<div class="card mt6" style="text-align:left"><div class="bold xxs mb4">🏆 荣誉</div>`;G.awards.forEach(a=>{h+=`<div class="xxs gold">${a.n}(${a.y})</div>`;});h+=`</div>`;}
    let leg=G.cApps>=500&&G.awards.length>=8?"⭐⭐⭐⭐⭐ 球王":G.cApps>=350&&G.awards.length>=5?"⭐⭐⭐⭐ 巨星":G.cApps>=200&&G.awards.length>=2?"⭐⭐⭐ 世界级":G.cApps>=100?"⭐⭐ 优秀":"⭐ 职业";
    h+=`<div class="card mt6 gl"><div class="xxs dim">评级</div><div class="gold bold" style="font-size:16px;margin-top:2px">${leg}</div></div>`;
    if(G.postRetire){h+=`<div class="card mt6 bl"><div class="bold xxs">${G.postRetire==="coach"?"🧑‍🏫 主教练":G.postRetire==="pundit"?"🎙️ 评论员":"🏢 体育总监"}</div></div>`;}
    h+=`<button class="btn btn-p btn-lg mt12" onclick="CC={name:'',nation:12,pos:'ST',diff:1,yci:0};G=null;VIEW='create';render()">🔄 重新开始</button></div>`;
  }

  h+=`</div>`;
  setDOM(h); // 更新并保持滚动状态
}

function renderChoice(aC){
  let h=`<div class="${aC}">`;
  if(G.pendingChoice==="season_end"){
    h+=`<div class="card gl center"><div style="font-size:28px">📅</div><div class="bold mt4 xs">S${G.season-1} 结束</div>`;
    if(G.leaguePos)h+=`<div class="xxs mt4">${G.club.n} ${G.club.lg} 第${G.leaguePos}</div>`;
    const sl=G.seasonLog[G.seasonLog.length-1];
    if(sl){h+=`<div class="sg mt4">${[{l:"⚽",v:sl.g},{l:"🅰️",v:sl.a},{l:"📊",v:sl.ap},{l:"⭐",v:sl.ar},{l:"CA",v:sl.ca}].map(s=>`<div class="sb"><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div>`;}
    h+=`</div>`;
    if(G.offers.length){h+=`<div class="sec mt12">📨 邀约</div>`;G.offers.forEach((o,i)=>{const up=o.club.rep>G.club.rep;h+=`<div class="card ck" onclick="acceptOffer(${i})"><div class="fb"><div><div class="bold xxs">${o.club.n} ${up?'<span class="green">↑</span>':''}</div><div class="dim xxs">${o.club.lg}·${o.club.rep}</div></div><div style="text-align:right"><div class="accent bold xxs">${fmt$(o.wage)}/周${o.wage>G.wage?' <span class="green">↑'+Math.round((o.wage/G.wage-1)*100)+'%</span>':''}</div><div class="xxs dim">${o.years}年·${fmt$(o.fee)}</div></div></div></div>`;});}
    h+=`<button class="btn btn-full mt8" onclick="stayAtClub()">${G.contract>0?`留在${G.club.s}`:`续约`}</button>`;
    if(G.age>=32)h+=`<button class="btn btn-d btn-full mt4" onclick="retirePlayer()">👋 退役</button>`;
  }else if(G.pendingChoice==="free_agent"){
    h+=`<div class="card gl center"><div style="font-size:28px">📋</div><div class="bold mt4">合同到期</div></div>`;
    if(G.offers.length){G.offers.forEach((o,i)=>{h+=`<div class="card ck" onclick="acceptOffer(${i})"><div class="fb"><div class="bold xxs">${o.club.n}</div><div class="accent bold xxs">${fmt$(o.wage)}/周 ${o.years}年</div></div></div>`;});}
    h+=`<button class="btn btn-full mt4" onclick="stayAtClub()">续约</button>`;
    if(G.age>=30)h+=`<button class="btn btn-d btn-full mt4" onclick="retirePlayer()">👋</button>`;
  }else if(G.pendingChoice==="retire_ask"){
    h+=`<div class="card gl center"><div style="font-size:28px">🤔</div><div class="bold mt4">退役？</div></div>`;
    h+=`<button class="btn btn-p btn-full mt8" onclick="G.pendingChoice=null;render()">💪 继续</button><button class="btn btn-d btn-full mt4" onclick="retirePlayer()">👋 退役</button>`;
  }else if(G.pendingChoice==="interview"){
    h+=`<div class="card center"><div style="font-size:24px">🎤</div><div class="bold mt4 xxs">采访</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="handleInterview('h')"><div class="cb-t">🙏 谦虚</div><div class="cb-d">+教练+球迷</div></div>`;
    h+=`<div class="cb" onclick="handleInterview('b')"><div class="cb-t">🔥 霸气</div><div class="cb-d">+人气-教练</div></div>`;
    h+=`<div class="cb" onclick="handleInterview('c')"><div class="cb-t">🤝 挺教练</div><div class="cb-d">+教练</div></div></div>`;
  }else if(G.pendingChoice==="intl"){
    h+=`<div class="card center"><div style="font-size:24px">${G.nation.f}</div><div class="bold mt4 xxs">国家队</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="handleIntl('play')"><div class="cb-t">${G.nation.f} 出战</div></div>`;
    h+=`<div class="cb" onclick="handleIntl('skip')"><div class="cb-t">🏠 休整</div></div></div>`;
  }else if(G.pendingChoice==="wage"){
    h+=`<div class="card center"><div style="font-size:24px">💰</div><div class="bold mt4 xxs">谈薪</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="handleWage('ask')"><div class="cb-t">💰 加薪</div></div>`;
    h+=`<div class="cb" onclick="handleWage('skip')"><div class="cb-t">🤝 算了</div></div></div>`;
  }else if(G.pendingChoice==="post_retire"){
    h+=`<div class="card gl center"><div style="font-size:28px">🔮</div><div class="bold mt4">退役后？</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="choosePostRetire('coach')"><div class="cb-t">🧑‍🏫 主教练</div></div>`;
    h+=`<div class="cb" onclick="choosePostRetire('pundit')"><div class="cb-t">🎙️ 评论员</div></div>`;
    h+=`<div class="cb" onclick="choosePostRetire('director')"><div class="cb-t">🏢 总监</div></div></div>`;
  }
  h+=`</div>`;return h;
}

// EXPOSE ALL to window
window.CC=CC;window.G=G;window.VIEW=VIEW;window.ST=ST;window.TACTIC=TACTIC;
window.render=render;window.notify=notify;
window.startGame=startGame;window.saveGame=saveGame;window.loadGame=loadGame;
window.advanceWeek=advanceWeek;window.advance4=advance4;window.simSeason=simSeason;
window.acceptOffer=acceptOffer;window.stayAtClub=stayAtClub;window.retirePlayer=retirePlayer;
window.handleInterview=handleInterview;window.handleIntl=handleIntl;
window.requestTransfer=requestTransfer;window.handleWage=handleWage;
window.choosePostRetire=choosePostRetire;
window.buyItem=buyItem;window.spendOn=spendOn;
render();
</script>
</body>
</html>
