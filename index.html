<style>
:root{--bg0:#060a07;--bg1:#0c140f;--bg2:#132019;--bg3:#1b3024;--a:#3ddc84;--a2:#00bfa5;--gl:rgba(61,220,132,.12);--gd:#ffd700;--rd:#ff4757;--bl:#5b9aff;--pk:#f472b6;--tx:#dce8df;--dm:#5f9070;--bd:#1a2e22;--cd:#0e1812}

body{font-family:'Noto Sans SC',sans-serif;background:var(--bg0);color:var(--tx);min-height:100vh;font-size:14px}

.nav{display:flex;gap:2px;margin-top:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{padding:3px 8px;border-radius:5px;border:1px solid var(--bd);background:0;color:var(--dm);cursor:pointer;font-size:8px;font-family:inherit;font-weight:500;white-space:nowrap}
.nb.on{background:var(--gl);border-color:var(--a);color:var(--a);font-weight:700}
.pg{padding:8px 10px 76px}
.c{background:var(--cd);border:1px solid var(--bd);border-radius:8px;padding:9px 10px;margin-bottom:5px}
.c.ck{cursor:pointer}.c.ck:hover{border-color:var(--a);background:var(--gl)}
.c.gl{border-color:rgba(255,215,0,.25);background:rgba(255,215,0,.03)}
.c.pk{border-color:rgba(244,114,182,.25);background:rgba(244,114,182,.03)}
.b{padding:5px 12px;border-radius:5px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx);cursor:pointer;font-size:9px;font-family:inherit;font-weight:500;transition:all .1s}

.bp{background:linear-gradient(135deg,var(--a),var(--a2));color:var(--bg0);border:none;font-weight:700}

.bf{width:100%}
.fb{display:flex;justify-content:space-between;align-items:center}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:2px 8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.center{text-align:center}.dm{color:var(--dm)}.x{font-size:10px}.xx{font-size:9px}.xxs{font-size:8px}.bld{font-weight:700}

.badge{display:inline-block;background:var(--gl);border:1px solid var(--a);border-radius:4px;padding:0 6px;font-size:7px;font-weight:600;color:var(--a);margin-right:2px}
.ab{display:flex;align-items:center;gap:3px;margin-bottom:2px;font-size:8px}

.ov{position:fixed;inset:0;background:rgba(6,10,7,.97);z-index:500;display:flex;flex-direction:column;align-items:center;overflow-y:auto}
.ov-box{width:100%;max-width:540px;padding:14px}

.ov-evt.show{opacity:1;transform:translateX(0)}

.ov-evt.eg{background:rgba(255,215,0,.06);border-left:2px solid var(--gd);color:var(--gd);font-weight:700}
.ov-evt.ea{background:rgba(61,220,132,.04);border-left:2px solid var(--a);color:var(--a)}
.ov-evt.eb{background:rgba(255,71,87,.04);border-left:2px solid var(--rd);color:var(--rd)}

.ov-evt.et{background:rgba(61,220,132,.03);border-left:2px solid var(--a2);color:var(--a2)}
.ov-evt.eo{background:rgba(255,71,87,.03);border-left:2px solid var(--rd);color:var(--rd)}
/* Penalty */
.pen{display:inline-block;width:16px;height:16px;border-radius:50%;margin:1px;font-size:9px;line-height:16px;text-align:center;font-weight:700}
.pen-ok{background:var(--a);color:var(--bg0)}

.diary{background:linear-gradient(135deg,rgba(255,215,0,.03),rgba(61,220,132,.02));border:1px solid rgba(255,215,0,.15);border-radius:8px;padding:10px;margin-bottom:5px;font-size:9px;line-height:1.5;font-style:italic;color:var(--tx)}

/* Legend compare */
.lg-row{display:flex;align-items:center;gap:4px;padding:3px 0;font-size:8px}
.lg-bar{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;position:relative}
.lg-fill{position:absolute;height:100%;border-radius:2px}
.lg-name{width:50px;text-align:center;font-weight:700;font-size:7px}
/* Speech */
.sp{background:linear-gradient(135deg,var(--bg2),var(--bg1));border:1.5px solid var(--bd);border-radius:9px;padding:12px;text-align:center;margin-bottom:6px}
/* UCL/WC bracket */
.bracket{font-size:8px}
.bracket .rd-title{color:var(--gd);font-weight:700;margin:4px 0 2px}
.bracket .rd-match{padding:2px 0;display:flex;justify-content:space-between}
.bracket .rd-match .win{color:var(--a);font-weight:700}
.bracket .rd-match .lose{color:var(--rd)}
</style>
</head>

// DIARY - generates first-person weekly narrative
function genDiary(){
  const m=G.lastMatch;
  let txt="";
  if(!m||!m.played){
    const pool= m?.reason==="未上场" ? 
      ["这周教练没让我上场，我得在训练中证明自己。","坐在替补席看满全场，真不是滋味。","没获得出场机会，但我会耐心等待。"] : 
      ["这周没有比赛，我把时间都花在了训练上。体能教练说我的状态不错。","今天训练后和队友们一起吃了饭，感觉大家的化学反应越来越好了。","没比赛的日子有点无聊，不过也是恢复体能的好机会。","今天教练找我聊了聊，他对我最近的表现"+((G.form>70)?"很满意。":"有些担心。")];
    txt=pick(pool);
  }else{
    if(m.rt>=8){
      txt=pick([`今天的比赛我发挥得非常好（${m.rt}分），`,`满分级别的表现！`])+pick([`对阵${m.opp}，我`,`面对${m.opp}，`])+(m.gl>0?`贡献了${m.gl}个进球`:`控制了整场比赛的节奏`)+"。"+pick(["赛后球迷们高呼我的名字，这种感觉让一切付出都值得。","更衣室里大家都很开心，这种赢球的感觉真好。","希望能保持这样的状态。"]);
    }else if(m.rt<5.5){
      txt=`今天对阵${m.opp}的比赛我表现得很糟糕（${m.rt}分）。`+pick(["有几次传球失误让我很自责。","赛后教练的眼神让我不寒而栗。","我需要振作起来，不能这样下去。","回家后我一个人在阳台坐了很久，想了很多。"]);
    }else{
      txt=`对阵${m.opp}，`+(m.res.includes("胜")?`我们赢了（${m.tg}-${m.og}），`+(m.gl>0?"我也有进球入账，":"虽然我没进球，但")+"整体还不错。":m.res.includes("负")?`可惜输了（${m.tg}-${m.og}），有点遗憾。`:`打平了（${m.tg}-${m.og}），差一点就赢了。`)+pick(["继续加油吧。","下周还有比赛，得好好准备。","回去看了比赛录像，发现自己还有提升空间。"]);
    }
    if(m.motm)txt+=" 拿到了全场最佳，挺开心的。";
  }
  if(G.romance?.mar)txt+=pick([" 回家老婆做了好吃的等我。"," 和老婆视频了一下，她让我注意休息。",""]);
  if(G.hp>0)txt+=` 该死的伤病，医生说还要${G.hpW}周才能恢复。`;
  return txt;
}

// UCL BRACKET
function simUCL(){
  if(G.club.t>2||G.leaguePos>4)return null;
  const myTeam=G.club.s;
  // Group stage
  const grpOpps=[];for(let i=0;i<3;i++)grpOpps.push(pick(UCL_TEAMS.filter(t=>t!==myTeam&&!grpOpps.includes(t))));
  const grpMatches=grpOpps.map(o=>{const tg=RI(0,3),og=RI(0,2);return{o,tg,og,w:tg>og};});
  const grpWins=grpMatches.filter(m=>m.w).length;
  const qualified=grpWins>=2||(grpWins>=1&&Math.random()>.4);
  if(!qualified)return{stage:"小组赛出局",grp:grpMatches,ko:[]};
  // Knockouts
  const koRounds=["十六强","八强","四强","半决赛","决赛"];
  const ko=[];let alive=true;
  for(let i=0;i<koRounds.length&&alive;i++){
    const opp=pick(UCL_TEAMS.filter(t=>t!==myTeam));
    const chance=.5+G.ca/500+(G.avgR-6)/20;
    const tg=RI(0,3),og=RI(0,3);
    let win=false;
    if(tg>og)win=true;else if(tg===og)win=Math.random()<chance;
    ko.push({rd:koRounds[i],o:opp,tg,og,w:win,pen:tg===og});
    if(!win)alive=false;
  }
  const lastRd=ko.length?ko[ko.length-1]:null;
  const stage=lastRd?(lastRd.w&&lastRd.rd==="决赛"?"🏆冠军":lastRd.rd+(lastRd.w?"晋级":"止步")):("小组赛出局");
  return{stage,grp:grpMatches,ko};
}

// WORLD CUP BRACKET
function simWC(){
  if(!G.intTeam)return null;
  const myTeam=G.nation.n;
  const grpOpps=[];for(let i=0;i<3;i++)grpOpps.push(pick(IOP.filter(t=>t!==myTeam&&!grpOpps.includes(t))));
  const grp=grpOpps.map(o=>{const tg=RI(0,3),og=RI(0,2);return{o,tg,og,w:tg>og};});
  const wins=grp.filter(m=>m.w).length;
  const qualified=wins>=2||(wins>=1&&Math.random()>.5);
  if(!qualified)return{stage:"小组赛出局",grp,ko:[]};
  const koRounds=["十六强","八强","四强","半决赛","决赛"];
  const ko=[];let alive=true;
  const ns=G.nation.id<=3?.15:G.nation.id<=9?.1:.05;
  for(let i=0;i<koRounds.length&&alive;i++){
    const opp=pick(IOP.filter(t=>t!==myTeam));
    const chance=.45+ns+G.ca/600;
    const tg=RI(0,3),og=RI(0,3);
    let win=tg>og||(tg===og&&Math.random()<chance);
    ko.push({rd:koRounds[i],o:opp,tg,og,w:win,pen:tg===og});
    if(!win)alive=false;
  }
  const lastRd=ko[ko.length-1];
  const stage=lastRd?(lastRd.w&&lastRd.rd==="决赛"?"🏆冠军！":lastRd.rd):("小组赛出局");
  return{stage,grp,ko};
}

// LEAGUE
function initLg(){const ts=LOP[G.club.l]||LOP["青年"];G.lg=[G.club.s,...ts].map(t=>({n:t,p:0,w:0,d:0,l:0,gf:0,ga:0,mp:0,me:t===G.club.s}));G.sc=[];}

// [FIX] 联赛周模拟函数修复：允许包含玩家球队强制模拟，解决场次不同步Bug，并加入动态射手榜生成
function simLgWk(includeMe = false, skipOpp = null){
  if(!G.lg)initLg();
  G.lg.forEach(t=>{
    if((t.me && !includeMe) || t.n === skipOpp) return;
    t.mp++;
    const r=Math.random();
    let gl=0;
    if(r<.4){t.w++;t.p+=3;gl=RI(1,3);t.gf+=gl;t.ga+=RI(0,2);}
    else if(r<.7){t.d++;t.p++;gl=RI(0,2);t.gf+=gl;t.ga+=gl;}
    else{t.l++;t.ga+=RI(1,3);gl=RI(0,1);t.gf+=gl;}
    
    // 把球队的部分进球分配给它的当家射手
    if(gl>0 && !t.me){
        let s = G.sc.find(x=>x.t===t.n);
        if(!s){
            s={n:pick(SNAMES), g:0, me:false, t:t.n};
            G.sc.push(s);
        }
        s.g += RI(0, gl);
    }
  });
}

function updLg(res,tg,og,goals){
  if(!G.lg)initLg();
  const me=G.lg.find(t=>t.me);
  if(!me)return;
  me.mp++;me.gf+=tg;me.ga+=og;
  if(res==="胜"){me.w++;me.p+=3;}else if(res==="平"){me.d++;me.p++;}else me.l++;
  let ms=G.sc.find(s=>s.me);
  if(!ms){ms={n:G.name,g:0,me:true};G.sc.push(ms);}
  ms.g+=goals;

  // 同时更新你刚刚对阵的对手的数据
  if(G.lastMatch && G.lastMatch.opp) {
      let op = G.lg.find(t=>t.n===G.lastMatch.opp);
      if(op) {
          op.mp++; op.gf+=og; op.ga+=tg;
          if(res==="负"){op.w++;op.p+=3;}else if(res==="平"){op.d++;op.p++;}else op.l++;
          if(og > 0) {
              let os = G.sc.find(x=>x.t===op.n);
              if(!os){
                  os={n:pick(SNAMES), g:0, me:false, t:op.n};
                  G.sc.push(os);
              }
              os.g += RI(0, og);
          }
      }
  }
}

// MATCH
function simMatch(isD,isCup,isInt,watch){
  if(G.hp>0){
    G.lastMatch={played:false,reason:"伤病"};
    G.diary=genDiary();
    if(!isCup && !isInt) simLgWk(true); // [FIX] 联赛缺席时补充同步场次
    return null;
  }
  const rc=G.teamRole==="legend"?.95:G.teamRole==="star"?.9:G.teamRole==="starter"?.82:G.teamRole==="vet_legend"?.6:G.teamRole==="squad"?.5:G.teamRole==="veteran"?.4:.22;
  let st=Math.random()<rc,sub=!st&&Math.random()<.4;
  if(!st&&!sub){
    G.lastMatch={played:false,reason:"未上场"};
    G.diary=genDiary();
    if(!isCup && !isInt) simLgWk(true); // [FIX] 联赛被轮换时补充同步场次
    return null;
  }
  const tm=TAC==="aggressive"?{a:1.2,d:.85}:TAC==="defensive"?{a:.75,d:1.2}:{a:1,d:1};
  const pz=POS[G.pos].z;let rt=6+(G._spBonus||0),ev=[],gl=0,as=0;
  G._spBonus=0;
  rt+=(G.ca/200)*(G.form/100)*(G.morale/100)*R(.7,1.3)*3;
  if(isD)rt+=.3;
  const ch=st?RI(2,7):RI(1,3);
  const uM=new Set(),rm=()=>{let m;do{m=RI(1,90);}while(uM.has(m)&&uM.size<85);uM.add(m);return m;};
  for(let i=0;i<ch;i++){
    const ro=Math.random(),mn=rm();
    if(pz==="A"){const sk=(G.shot+G.drib+G.mental)/60*tm.a;if(ro<sk*.35){gl++;rt+=1.2;ev.push({t:"G",m:mn,x:`⚽${G.name}${pick(["破门！","推射入网！","抢点！","远射死角！","头球！","凌空抽射！"])}`});}else if(ro<sk*.5){as++;rt+=.6;ev.push({t:"A",m:mn,x:`🅰️${G.name}${pick(["直塞助攻！","过顶球助攻！","横传！"])}`});}else if(ro<sk*.65){ev.push({t:"C",m:mn,x:`💨${G.name}${pick(["被扑！","中柱！","打偏！"])}`});rt+=.2;}}
    else if(pz==="M"){const sk=(G.pass+G.mental+G.drib)/60*tm.a;if(ro<sk*.2){gl++;rt+=1.5;ev.push({t:"G",m:mn,x:`⚽${G.name}${pick(["远射！","世界波！","插上破门！"])}`});}else if(ro<sk*.45){as++;rt+=.6;ev.push({t:"A",m:mn,x:`🅰️${G.name}${pick(["过顶球！","直塞！"])}`});}else if(ro<sk*.6){ev.push({t:"K",m:mn,x:`🔑${G.name}${pick(["控制节奏","拦截","精彩长传"])}`});rt+=.3;}}
    else if(pz==="D"){const sk=(G.def+G.phys+G.mental)/60*tm.d;if(ro<sk*.08){gl++;rt+=1.8;ev.push({t:"G",m:mn,x:`⚽${G.name}${pick(["头球！","定位球！"])}`});}else if(ro<sk*.2){as++;rt+=.5;ev.push({t:"A",m:mn,x:`🅰️${G.name}长传助攻！`});}else if(ro<sk*.5){ev.push({t:"D",m:mn,x:`🛡️${G.name}${pick(["铲球！","救险！","盯人"])}`});rt+=.4;}}
    else{const sk=(G.def+G.mental+G.phys)/60*tm.d;if(ro<sk*.4){ev.push({t:"S",m:mn,x:`🧤${G.name}${pick(["扑救！","扑出单刀！","连扑！"])}`});rt+=.5;}}
    if(Math.random()<.06){const m2=rm();if(Math.random()<.25){ev.push({t:"Y",m:m2,x:`🟨黄牌！`});rt-=.3;}else{ev.push({t:"B",m:m2,x:`😤${G.name}${pick(["失误","被过","低级失误"])}`});rt-=.5;}}
  }
  if(Math.random()<.035){G.hp=Math.random()>.6?2:1;G.hpW=G.hp===2?RI(4,10):RI(1,3);ev.push({t:"I",m:rm(),x:`🏥${G.hp===2?"重伤缺"+G.hpW+"周":"轻伤"+G.hpW+"周"}`});rt-=1;}
  const tO=Math.round(R(0,2.5)*G.club.r/100*(isInt?.8:1));
  let tg=gl+tO,og=Math.round(R(0,3)*R(.4,1));
  if(tg<=og&&rt>=8&&Math.random()>.5)tg=og+1;
  for(let i=0;i<tO;i++)ev.push({t:"TG",m:rm(),x:`⚽队友破门！`});
  for(let i=0;i<og;i++)ev.push({t:"OG",m:rm(),x:`⚽对手进球...`});
  ev.sort((a,b)=>a.m-b.m);
  let res=tg>og?"胜":tg<og?"负":"平";
  let pen=null;
  if(res==="平"&&(isCup||isInt)){pen={rds:[],ms:0,os:0,won:false};res="平(待点球)";}
  rt=cl(Math.round(rt*10)/10,3,10);
  const motm=rt>=8&&Math.random()>.3;
  G.apps++;G.cApps++;G.goals+=gl;G.cGoals+=gl;G.ast+=as;G.cAst+=as;
  G.totR+=rt;G.avgR=Math.round(G.totR/G.apps*10)/10;
  if(motm){G.motm++;G.cMotm++;}
  G.stam=cl(G.stam-R(15,30),0,100);G.form=cl(G.form+(rt-6.5)*5,20,100);
  if(gl>=3){G.cHatTricks++;G.events.push({y:G.year,t:`🎩帽子戏法！`,ic:"🎩"});}
  if(res.includes("胜")||res==="平(待点球)"){G.consecW++;G.consecL=0;}else if(res.includes("负")){G.consecL++;G.consecW=0;}
  const opp=isInt?pick(IOP.filter(x=>x!==G.nation.n)):G.nxOp?.o||lop();
  G.lastMatch={played:true,st,sub,rt,gl,as,motm,ev,res,tg,og,opp,isD,isCup,isInt,pen};
  G.matchLog.push({r:rt,g:gl,a:as,res,opp,tg,og,motm,type:isInt?"int":isCup?"cup":isD?"derby":"lg"});
  if(!isInt&&!isCup){
    updLg(res.includes("胜")?"胜":res.includes("负")?"负":"平",tg,og,gl);
    simLgWk(false, G.lastMatch.opp); // [FIX] 在这里只更新别人，同时跳过已在updLg中更新过的对手
  }
  if(rt>=7.5)G.managerRel=cl(G.managerRel+R(1,3),0,100);else if(rt<5.5)G.managerRel=cl(G.managerRel-R(2,5),0,100);
  if(gl>0)G.fanPop=cl(G.fanPop+R(1.5,4),0,100);
  [[G.cApps===1,"🎒首秀"],[G.cGoals===1,"⚽首球"],[G.cApps===100,"💯百场"],[G.cGoals===100,"💯百球"]].forEach(([c,t])=>{if(c&&!G._ms[t]){G._ms[t]=1;G.events.push({y:G.year,t,ic:t[0]});}});
  if(G.rival)G.rival.g+=RI(0,1);
  G.nxOp=nxOp();
  // diary
  G.diary=genDiary();
  // watch mode: show overlay
  if(watch&&G.lastMatch.played){showMatchOverlay();return G.lastMatch;}
  return G.lastMatch;
}

// PENALTY (animated via overlay)
function simPenRound(){
  const p=G.lastMatch.pen;
  const myC=cl((G.shot+G.mental)/40+G.ca/400,.3,.85);
  const myIn=Math.random()<myC;
  const opIn=Math.random()<.72;
  if(myIn)p.ms++;if(opIn)p.os++;
  p.rds.push({my:myIn,op:opIn});
  const rd=p.rds.length;
  if(rd>=5){
    if(p.ms!==p.os){p.won=p.ms>p.os;G.lastMatch.res=p.won?"胜(点球)":"负(点球)";OV.penDone=true;return true;}
  }else if(rd<5){
    const rem=5-rd;
    if(p.ms>p.os+rem||p.os>p.ms+rem){p.won=p.ms>p.os;G.lastMatch.res=p.won?"胜(点球)":"负(点球)";OV.penDone=true;return true;}
  }
  return false;
}

// OVERLAY SYSTEM (no full page refresh)
function showMatchOverlay(){
  OV={type:"match",idx:0,phase:"events",penDone:false};
  renderOverlay();
  // start event playback
  const playNext=()=>{
    if(!OV||OV.type!=="match")return;
    const m=G.lastMatch;
    if(OV.phase==="events"){
      if(OV.idx<m.ev.length){OV.idx++;renderOverlay();setTimeout(playNext,700);}
      else{
        if(m.pen){OV.phase="penalty";OV.penIdx=0;renderOverlay();setTimeout(playNext,1200);}
        else{OV.phase="done";renderOverlay();}
      }
    }else if(OV.phase==="penalty"){
      const done=simPenRound();
      renderOverlay();
      if(done){OV.phase="done";setTimeout(()=>renderOverlay(),800);}
      else setTimeout(playNext,1000);
    }
  };
  setTimeout(playNext,500);
}
function skipOverlay(){
  if(!OV)return;
  const m=G.lastMatch;
  OV.idx=m.ev.length;
  if(m.pen&&!OV.penDone){while(!simPenRound()){}}
  OV.phase="done";
  renderOverlay();
}
function closeOverlay(){OV=null;document.getElementById('overlay').innerHTML='';render();}

function renderOverlay(){
  if(!OV){document.getElementById('overlay').innerHTML='';return;}
  const el=document.getElementById('overlay');
  const m=G.lastMatch;
  const shown=m.ev.slice(0,OV.idx);
  let curH=0,curA=0;
  shown.forEach(e=>{if(e.t==="G"||e.t==="TG")curH++;if(e.t==="OG")curA++;});
  const lastMin=shown.length?shown[shown.length-1].m:0;
  const fin=OV.phase==="done";

  let h=`<div class="ov"><div class="ov-box">`;
  h+=`<div class="ov-time">${fin?"终场":(OV.phase==="penalty"?"⚡ 点球大战":"⏱️ "+lastMin+"'")}</div>`;
  h+=`<div class="fb"><div class="ov-team">${G.club.s}</div><div class="ov-score">${curH} - ${curA}</div><div class="ov-team">${m.opp}</div></div>`;
  h+=`<div class="ov-evts" id="ov-evts">`;
  shown.forEach((e,i)=>{
    const cls=["G","H"].includes(e.t)?"eg":e.t==="A"?"ea":["B","I","R","Y"].includes(e.t)?"eb":e.t==="TG"?"et":e.t==="OG"?"eo":"en";
    h+=`<div class="ov-evt ${cls} show"><span class="em">${e.m}'</span>${esc(e.x)}</div>`;
  });
  h+=`</div>`;

  // Penalty display
  if(OV.phase==="penalty"||fin&&m.pen){
    h+=`<div class="c mt6 center"><div class="bld x">⚡ 点球大战</div><div class="mt4"><div class="xx dm mb4">${G.club.s}：`;
    const p=m.pen;
    for(let i=0;i<Math.max(5,p.rds.length);i++){
      if(i<p.rds.length)h+=`<span class="pen ${p.rds[i].my?'pen-ok':'pen-miss'}">${p.rds[i].my?'✓':'✗'}</span>`;
      else h+=`<span class="pen pen-wait">·</span>`;
    }
    h+=` <span class="bld">${p.ms}</span></div><div class="xx dm">${m.opp}：`;
    for(let i=0;i<Math.max(5,p.rds.length);i++){
      if(i<p.rds.length)h+=`<span class="pen ${p.rds[i].op?'pen-ok':'pen-miss'}">${p.rds[i].op?'✓':'✗'}</span>`;
      else h+=`<span class="pen pen-wait">·</span>`;
    }
    h+=` <span class="bld">${p.os}</span></div></div></div>`;
  }

  if(fin){
    h+=`<div class="c gl mt6 center"><div class="bld x">评分: <span class="${m.rt>=8?'go':m.rt>=7?'ac':m.rt<5.5?'rd':''}" style="font-size:16px">${m.rt}</span>${m.motm?' ⭐':''} &nbsp;·&nbsp; ${m.res}</div><div class="xx dm mt2">⚽${m.gl} 🅰️${m.as}</div></div>`;
    h+=`<button class="b bp bf mt6" onclick="closeOverlay()">继续</button>`;
  }else{
    h+=`<button class="b bs bf mt6" onclick="skipOverlay()">⏩ 跳过</button>`;
  }
  h+=`</div></div>`;
  el.innerHTML=h;
  const evEl=document.getElementById('ov-evts');if(evEl)evEl.scrollTop=evEl.scrollHeight;
}

// [FIX] 能力衰退机制下限：速度体能最低保底为8，综合能力CA最低保底为35（青训初始水平）
function wkGrow(){
  const age=G.age;let g=age<=18?1.8:age<=22?1.4:age<=25?.8:age<=28?.3:-.2-(age-29)*.12;
  if(g>0){
    const gap=Math.max(0,(G.pa-G.ca)/120);
    G.ca=cl(G.ca+gap*(.8*(G.form/100)+.5)*g*(G.club.r/100),35,G.pa); 
    const gr=(a,v)=>{G[a]=cl(G[a]+v,1,20);},s=()=>R(0,.25)*g;
    if(G.trainFocus==="attack"){gr("shot",s());gr("drib",s());}
    else if(G.trainFocus==="defense"){gr("def",s());gr("phys",s());}
    else if(G.trainFocus==="physical"){gr("pace",s());gr("phys",s());}
    else if(G.trainFocus==="technical"){gr("pass",s());gr("drib",s());gr("mental",s());}
    else{["pace","shot","pass","drib","def","phys","mental"].forEach(a=>gr(a,s()*.5));}
  }else{
    if(age>=30){
      const d=Math.log(age-28)*.08;
      G.pace=cl(G.pace-d*R(.3,.6),8,20); // 速度下限卡在8
      G.phys=cl(G.phys-d*R(.2,.4),8,20); // 体能下限卡在8
      if(Math.random()>.6){G.pass=cl(G.pass+R(0,.15),1,20);G.mental=cl(G.mental+R(0,.15),1,20);}
    }
    G.ca=cl(G.ca+g*.3,35,200); // 综合能力CA下限卡在35（职业底线）
  }
  G.stam=cl(G.stam+R(5,15),0,100);
  if(G.hp>0){G.hpW--;if(G.hpW<=0){G.hp=0;G.hpW=0;if(G.cApps>5)G.events.push({y:G.year,t:`💪复出！`,ic:"💪"});}}
  G.morale=cl(G.morale+R(-3,3),20,100);G.form=cl(G.form+R(-4,4),20,100);
  G.totalEarnings+=G.wage;G.savings+=G.wage;calcVal();
  if(G.rival)G.rival.ca=cl(G.rival.ca+R(-.3,.5),40,195);
}
function sEnd(){
  G.caHistory.push({a:G.age,c:Math.round(G.ca)});
  const atk=["ST","LW","RW","CAM"].includes(G.pos);
  if(G.goals>=25&&G.club.t<=2)G.awards.push({y:G.year,n:"联赛金靴"});
  if(G.avgR>=7.8&&G.apps>=20)G.awards.push({y:G.year,n:"最佳阵容"});
  if(G.ca>=160&&((atk&&G.goals>=18)||(!atk&&G.avgR>=7.5))&&G.club.t===1&&Math.random()>.35){G.awards.push({y:G.year,n:"金球奖"});G.events.push({y:G.year,t:`🏆金球奖！`,ic:"🏆"});}
  if(G.age<=21&&G.avgR>=7&&G.apps>=15)G.awards.push({y:G.year,n:"最佳新秀"});
  if(!G.intTeam&&G.ca>=80&&G.avgR>=6.8){G.intTeam=true;G.events.push({y:G.year,t:`${G.nation.f}入选国家队！`,ic:G.nation.f});}
  if(G.intTeam){G.intCaps+=RI(4,12);G.intGoals+=RI(0,atk?6:2);}
  // league pos
  if(G.lg){G.lg.sort((a,b)=>b.p-a.p||(b.gf-b.ga)-(a.gf-a.ga));G.leaguePos=G.lg.findIndex(t=>t.me)+1;if(G.leaguePos===1){G.awards.push({y:G.year,n:`${G.club.l}冠军`});G.events.push({y:G.year,t:`🏆联赛冠军！`,ic:"🏆"});}}
  // UCL
  const ucl=simUCL();if(ucl){G.uclBracket=ucl;G.events.push({y:G.year,t:`🌍欧冠${ucl.stage}`,ic:"🌍"});if(ucl.stage.includes("冠军"))G.awards.push({y:G.year,n:"欧冠冠军"});}
  // World Cup
  if(G.year%4===2&&G.intTeam){G.worldCupA++;const wc=simWC();if(wc){G.wcBracket=wc;G.events.push({y:G.year,t:`🌍世界杯${wc.stage}`,ic:"🌍"});if(wc.stage.includes("冠军")){G.worldCupW++;G.awards.push({y:G.year,n:"世界杯冠军"});}}}
  // endorsements
  if(!G.endorse)G.endorse=[];EDR.forEach(e=>{if(G.ca>=e.r&&!G.endorse.find(x=>x.n===e.n)&&Math.random()>.6){G.endorse.push({n:e.n,v:e.v,y:G.year});G.wage+=e.v;}});
  G.seasonLog.push({s:G.season,g:G.goals,a:G.ast,ap:G.apps,ar:G.avgR,cl:G.club.s,p:G.leaguePos||"-",ca:Math.round(G.ca)});
  if(G.rival){G.rival.ca=cl(G.rival.ca+R(-2,3),40,195);G.rival.g=RI(5,30);}
  G.lg=null;
}

// [FIX] 35岁及以上老将必然能够获得中超报价逻辑
function genOff(){
  G.offers=[];
  if(G.ca<40)return; // 放宽CA限制，保证能继续踢
  let n=G.transferReq?RI(3,5):G.avgR>=7.2?RI(2,4):RI(1,2);
  let el=[];
  if(G.age>=35){
    // 大龄倾向于收到中超邀约或能力匹配的邀约
    el=CLB.filter(c=>c.id!==G.club.id&&(c.l==="中超"||c.r<=G.ca+15));
    // 强制加入中超球队
    if(!el.some(c=>c.l==="中超")){
      const csl=CLB.filter(c=>c.id!==G.club.id&&c.l==="中超");
      if(csl.length)el.push(pick(csl));
    }
  }else{
    el=CLB.filter(c=>c.id!==G.club.id&&c.r>=G.club.r-15);
  }
  // 兜底方案，保证有队伍选
  if(el.length===0) el=CLB.filter(c=>c.id!==G.club.id);
  
  for(let i=0;i<n&&el.length;i++){
    const c=el.splice(RI(0,el.length-1),1)[0];
    const wg=G.age>=35?Math.round(G.wage*R(.5,1.2)):Math.round(G.wage*R(1.2,2.8)); // 养老薪资
    G.offers.push({club:c,wage:wg,years:RI(1,3),fee:Math.round(G.value*R(.8,1.3))});
  }
  G.transferReq=false;
}

// ADVANCE REFACTOR
function endOfWeek(){
  wkGrow();
  updRole();
  G.week++;
  if(G.week>4){G.week=1;G.month++;if(G.month>12){G.month=1;G.year++;}}
  if(Math.random()<.025&&!G.pendingChoice){
    const et=pick(["interview","intl","wage","rom"]);
    if(et==="interview")G.pendingChoice="interview";
    else if(et==="intl"&&G.intTeam&&G.month>=3&&G.month<=4)G.pendingChoice="intl";
    else if(et==="wage"&&G.teamRole!=="youth"&&G.avgR>=7)G.pendingChoice="wage";
    else if(et==="rom"&&G.age>=18)G.pendingChoice="rom_enc";
  }
  if(G.month===6&&G.week===1){
    sEnd();genOff();
    G.pendingChoice="season_end";
    G.season++;G.age++;G.goals=0;G.ast=0;G.apps=0;G.avgR=0;G.totR=0;G.motm=0;
    G.matchLog=[];G.consecL=0;G.consecW=0;G.contract--;
    if(G.contract<=0)G.pendingChoice="free_agent";
    // [FIX] 删除了强制跳转到 retire_ask 的拦截，老将现在可以正常操作转会菜单
    return false;
  }
  return !G.pendingChoice;
}

function doAdv(watch){
  if(G.retired||G.pendingChoice)return false;
  const hm=Math.random()<.6;
  if(hm){
    if(watch){
      G.pendingChoice="speech";
      render();
      return false;
    }
    simMatch(G.nxOp?.t==="derby",G.nxOp?.t==="cup",false,false);
  }else{
    G.lastMatch=null;
    G.diary=genDiary();
    // [FIX] 空白周不再调用 simLgWk() 错误地给全联赛增加场次
  }
  return endOfWeek();
}

function watchWk(){
  doAdv(true);
  render();
}

function afterSp(b){
  G._spBonus=b;
  G.pendingChoice=null;
  simMatch(G.nxOp?.t==="derby",G.nxOp?.t==="cup",false,true); 
  endOfWeek(); 
  render(); 
}

function advWk(){doAdv(false);render();}
function adv4(){let i=0;while(i<4&&doAdv(false))i++;render();}
function simS(){let s=200;while(s-->0&&doAdv(false));render();}

function buyI(id){const it=SHP.find(x=>x.id===id);if(!it||G.savings<it.p||G.owned.includes(id))return;G.savings-=it.p;G.totalSpent+=it.p;G.owned.push(id);G.morale=cl(G.morale+it.m,20,100);notify(it.i+it.n);render();}

  else if(G.pendingChoice==="retire_ask"){h+=`<div class="c gl center"><div style="font-size:22px">🤔</div><div class="bld mt2">退役？</div></div><button class="b bp bf mt4" onclick="G.pendingChoice=null;render()">💪继续</button><button class="b bd bf mt4" onclick="retire()">👋退役</button>`;}
  else if(G.pendingChoice==="interview"){h+=`<div class="c center"><div style="font-size:18px">🎤</div><div class="bld mt2 xxs">采访</div></div><div class="cg"><div class="cb" onclick="hIntv('h')"><div class="bld xxs">🙏谦虚</div></div><div class="cb" onclick="hIntv('b')"><div class="bld xxs">🔥霸气</div></div><div class="cb" onclick="hIntv('c')"><div class="bld xxs">🤝挺教练</div></div></div>`;}
  else if(G.pendingChoice==="intl"){h+=`<div class="c center"><div style="font-size:18px">${G.nation.f}</div><div class="bld mt2 xxs">国家队</div></div><div class="cg"><div class="cb" onclick="hIntl('play')"><div class="bld xxs">${G.nation.f}出战</div></div><div class="cb" onclick="hIntl('skip')"><div class="bld xxs">🏠休整</div></div></div>`;}
  else if(G.pendingChoice==="wage"){h+=`<div class="c center"><div style="font-size:18px">💰</div><div class="bld mt2 xxs">谈薪</div></div><div class="cg"><div class="cb" onclick="hWage('ask')"><div class="bld xxs">💰加薪</div></div><div class="cb" onclick="hWage('skip')"><div class="bld xxs">🤝算了</div></div></div>`;}
  else if(G.pendingChoice==="rom_enc"){const unmet=LOV.filter(l=>!(G.romance?.p||[]).find(p=>p.id===l.id));if(unmet.length){const l=pick(unmet);h+=`<div class="c pk center"><div style="font-size:20px">${l.e}</div><div class="bld mt2 xxs">偶遇 ${l.nm}</div><div class="xxs dm mt2">${l.age}岁·${l.job}·${l.d}</div></div><div class="cg"><div class="cb" onclick="meetL('${l.id}')"><div class="bld xxs">💕搭讪</div></div><div class="cb" onclick="G.pendingChoice=null;render()"><div class="bld xxs">🚶路过</div></div></div>`;}else G.pendingChoice=null;}
  else if(G.pendingChoice==="post_retire"){h+=`<div class="c gl center"><div style="font-size:22px">🔮</div><div class="bld mt2">退役后？</div></div><div class="cg"><div class="cb" onclick="chPR('coach')"><div class="bld xxs">🧑‍🏫主教练</div></div><div class="cb" onclick="chPR('pundit')"><div class="bld xxs">🎙️评论员</div></div><div class="cb" onclick="chPR('director')"><div class="bld xxs">🏢总监</div></div></div>`;}
  return h;
}

// EXPOSE ALL
window.CC=CC;window.render=render;window.notify=notify;
window.startGame=startGame;window.sv=sv;window.ld=ld;
window.advWk=advWk;window.adv4=adv4;window.simS=simS;
window.watchWk=watchWk;window.afterSp=afterSp;
window.skipOverlay=skipOverlay;window.closeOverlay=closeOverlay;
window.accOff=accOff;window.stayCl=stayCl;window.retire=retire;
window.hIntv=hIntv;window.hIntl=hIntl;window.reqTr=reqTr;window.hWage=hWage;window.chPR=chPR;
window.buyI=buyI;window.spdOn=spdOn;
window.meetL=meetL;window.gGift=gGift;window.setAL=setAL;
window.propose=propose;window.baby=baby;window.goDate=goDate;
render();
</script>
