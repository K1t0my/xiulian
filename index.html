function loadGame(){try{const s=localStorage.getItem('gp5_2');if(s){G=JSON.parse(s);VIEW="dashboard";render();notify("📂 已加载");}else notify("无存档");}catch(e){notify("失败");}}

function leagueOpp(){return pick(LG_OPP[G.club.lg]||LG_OPP["青年"]);}
function genNextOpp(){return{opp:leagueOpp(),type:pick(["lg","lg","lg","lg","lg","cup","derby"])};}
function genRival(){return{n:pick(["马丁内斯","席尔瓦","穆勒","迪亚斯","罗西","姆巴佩","哈兰德","贝林厄姆"]),ca:Math.round(G.ca*R(.85,1.15)),g:0,na:pick(NATIONS)};}

// === LEAGUE TABLE ===
function initLeague(){
  const teams=LG_OPP[G.club.lg]||LG_OPP["青年"];
  const all=[G.club.s,...teams];
  G.league=all.map(t=>({n:t,pts:0,w:0,d:0,l:0,gf:0,ga:0,mp:0,isMe:t===G.club.s}));
  G.leagueScorers=[];
  const pool = STARS[G.club.lg] || STARS["青年"];
  pool.forEach(n => G.leagueScorers.push({n, g: 0, isMe: false}));
  G.leagueAssists=[];
}
function simLeagueWeek(){
  if(!G.league)initLeague();
  G.league.forEach(t=>{
    if(t.isMe)return;
    t.mp++;
    const r=Math.random();
    if(r<.4){t.w++;t.pts+=3;const gf=RI(1,3),ga=RI(0,gf-1);t.gf+=gf;t.ga+=ga;}
    else if(r<.7){t.d++;t.pts+=1;const g=RI(0,2);t.gf+=g;t.ga+=g;}
    else{t.l++;const ga=RI(1,3),gf=RI(0,ga-1);t.gf+=gf;t.ga+=ga;}
  });
  // Realistically accumulate goals for AI stars
  G.leagueScorers.filter(s=>!s.isMe).forEach(s=>{
    if(Math.random()<0.45) s.g += RI(1, 2);
  });
}
function updateMyLeague(result,tg,og,goals,assists){
  if(!G.league)initLeague();
  const me=G.league.find(t=>t.isMe);
  if(!me)return;
  me.mp++;me.gf+=tg;me.ga+=og;
  if(result==="胜"){me.w++;me.pts+=3;}else if(result==="平"){me.d++;me.pts+=1;}else me.l++;
  let ms=G.leagueScorers.find(s=>s.isMe);
  if(!ms){ms={n:G.name,g:0,a:0,isMe:true};G.leagueScorers.push(ms);}
  ms.g+=goals;ms.a=(ms.a||0)+assists;
}

// === MATCH ENGINE ===
function simMatch(isDerby,isCup,intMatch){
  const oppName = intMatch ? pick(INT_OPP.filter(x=>x!==G.nation.n)) : (G.nextOpp?.opp || leagueOpp());

  let played = false, started = false, subbed = false, reason = "";
  if (G.hp > 0) {
      reason = "伤病缺阵";
  } else {
      const rc = G.teamRole==="legend"?0.95:G.teamRole==="star"?0.9:G.teamRole==="starter"?0.82:G.teamRole==="squad"?0.5:0.22;
      started = Math.random() < rc;
      subbed = !started && Math.random() < 0.4;
      if (!started && !subbed) reason = "未进大名单";
      else played = true;
  }

  let tg = 0, og = 0, result = "平", rating = 6, goals = 0, assists = 0, events = [], isMotm = false, ycc = 0;
  const ts = G.club.rep / 100 * (intMatch ? 0.8 : 1);
  let teamOtherGoals = Math.round(R(0, 2.5) * ts);
  og = Math.round(R(0, 3) * R(0.4, 1));

  if (played) {
      const tm=TAC==="aggressive"?{a:1.2,d:0.85,i:1.3}:TAC==="defensive"?{a:0.75,d:1.2,i:0.8}:{a:1,d:1,i:1};
      const pz=POS[G.pos].z;
      const pb=(G.ca/200)*(G.form/100)*(G.morale/100)*R(0.7,1.3);
      if(isDerby)rating+=0.3;rating+=pb*3;
      const chances=started?RI(2,7):RI(1,3);
      const usedM=new Set();const rm=()=>{let m;do{m=RI(1,90);}while(usedM.has(m)&&usedM.size<85);usedM.add(m);return m;};

      for(let i=0;i<chances;i++){
        const roll=Math.random(),min=rm();
        if(pz==="ATK"){const sk=(G.shot+G.drib+G.mental)/60*tm.a;
          if(roll<sk*0.35){goals++;rating+=1.2;events.push({t:"G",min,txt:`⚽${G.name}${pick(["破门！","推射入网！","抢点得分！","远射死角！","头球！","凌空抽射！"])}`});}
          else if(roll<sk*0.5){assists++;rating+=0.6;events.push({t:"A",min,txt:`🅰️${G.name}${pick(["直塞助攻！","过顶球助攻！","横传造成进球！"])}`});}
          else if(roll<sk*0.65){events.push({t:"C",min,txt:`💨${G.name}${pick(["射门被扑！","击中门柱！","单刀打偏！"])}`});rating+=0.2;}
        }else if(pz==="MID"){const sk=(G.pass+G.mental+G.drib)/60*tm.a;
          if(roll<sk*0.2){goals++;rating+=1.5;events.push({t:"G",min,txt:`⚽${G.name}${pick(["远射破门！","世界波！","后插上破门！"])}`});}
          else if(roll<sk*0.45){assists++;rating+=0.6;events.push({t:"A",min,txt:`🅰️${G.name}${pick(["过顶球助攻！","直塞助攻！","斜传造进球！"])}`});}
          else if(roll<sk*0.6){events.push({t:"K",min,txt:`🔑${G.name}${pick(["控制节奏","关键拦截","精彩长传"])}`});rating+=0.3;}
        }else if(pz==="DEF"){const sk=(G.def+G.phys+G.mental)/60*tm.d;
          if(roll<sk*0.08){goals++;rating+=1.8;events.push({t:"G",min,txt:`⚽${G.name}${pick(["角球头球！","定位球远射！","压上破门！"])}`});}
          else if(roll<sk*0.2){assists++;rating+=0.5;events.push({t:"A",min,txt:`🅰️${G.name}长传助攻！`});}
          else if(roll<sk*0.5){events.push({t:"D",min,txt:`🛡️${G.name}${pick(["关键铲球！","门线救险！","完美盯人","飞身封堵！"])}`});rating+=0.4;}
        }else{const sk=(G.def+G.mental+G.phys)/60*tm.d;
          if(roll<sk*0.4){events.push({t:"S",min,txt:`🧤${G.name}${pick(["飞身扑救！","扑出单刀！","连续扑救！"])}`});rating+=0.5;}
        }
        if(Math.random()<0.07){const m2=rm();if(Math.random()<0.3){ycc++;events.push({t:"Y",min:m2,txt:`🟨${G.name}黄牌！`});rating-=0.3;}else{events.push({t:"B",min:m2,txt:`😤${G.name}${pick(["传球失误","被过掉","低级失误"])}`});rating-=0.5;}}
      }
      if(ycc>=2){events.push({t:"R",min:rm(),txt:`🟥两黄一红！`});rating-=2;}
      if(Math.random()<0.04*tm.i){const sv=Math.random()>0.6;G.hp=sv?2:1;G.hpW=sv?RI(4,10):RI(1,3);events.push({t:"I",min:rm(),txt:`🏥${sv?"重伤缺"+G.hpW+"周":"轻伤"+G.hpW+"周"}`});rating-=1;}

      rating=cl(Math.round(rating*10)/10,3,10);
      isMotm=rating>=8&&Math.random()>0.3;
      tg=goals+teamOtherGoals;
      if(tg<=og&&rating>=8&&Math.random()>0.5)tg=og+1;

      for(let i=0;i<teamOtherGoals;i++) events.push({t:"TG",min:rm(),txt:`⚽ 队友破门！`});
      for(let i=0;i<og;i++) events.push({t:"OG",min:rm(),txt:`⚽ 对手进球...`});
      events.sort((a,b)=>a.min-b.min);

      G.apps++;G.cApps++;G.goals+=goals;G.cGoals+=goals;G.ast+=assists;G.cAst+=assists;
      G.totR+=rating;G.avgR=Math.round(G.totR/G.apps*10)/10;
      if(isMotm){G.motm++;G.cMotm++;}
      G.stam=cl(G.stam-R(15,30),0,100);G.form=cl(G.form+(rating-6.5)*5,20,100);
      if(goals>=3){G.cHatTricks++;events.push({t:"H",min:91,txt:`🎩帽子戏法！`});G.events.push({y:G.year,t:`🎩 帽子戏法！`,ic:"🎩"});}

      [[G.cApps===1,"🎒首秀！"],[G.cGoals===1,"⚽首球！"],[G.cApps===100,"💯百场！"],[G.cGoals===100,"💯百球！"],[G.cApps===500,"🐐500场！"]].forEach(([c,t])=>{if(c&&!G._ms[t]){G._ms[t]=1;G.events.push({y:G.year,t,ic:t[0]});}});

  } else {
      tg = teamOtherGoals;
      const rm=()=>RI(1,90);
      for(let i=0;i<tg;i++) events.push({t:"TG",min:rm(),txt:`⚽ 队友破门！`});
      for(let i=0;i<og;i++) events.push({t:"OG",min:rm(),txt:`⚽ 对手进球...`});
      events.sort((a,b)=>a.min-b.min);
  }

  result=tg>og?"胜":tg<og?"负":"平";

  if (played) {
      if(result==="胜"){G.consecW++;G.consecL=0;if(G.consecW>G.bestStreak)G.bestStreak=G.consecW;}
      else if(result==="负"){G.consecL++;G.consecW=0;}else{G.consecW=0;G.consecL=0;}
      if(result==="胜"&&goals>0&&tg-og===1&&Math.random()>0.4){G.events.push({y:G.year,t:`🔥 绝杀！`,ic:"🔥"});G.fanPop=cl(G.fanPop+5,0,100);}
      if(rating>=7.5)G.managerRel=cl(G.managerRel+R(1,3),0,100);
      else if(rating<5.5)G.managerRel=cl(G.managerRel-R(2,5),0,100);
      if(goals>0)G.fanPop=cl(G.fanPop+R(1.5,4),0,100);
      if(isMotm)G.fanPop=cl(G.fanPop+R(1,3),0,100);
  }

  if(!intMatch && !isCup) {
      updateMyLeague(result, tg, og, goals, assists);
      simLeagueWeek();
  }

  G.lastMatch={played,reason,started,subbed,rating,goals,assists,isMotm,events,result,tg,og,opp:oppName,isDerby,isCup,intMatch};
  G.matchLog.push({r:played?rating:"-",g:goals,a:assists,res:result,opp:oppName,tg,og,motm:isMotm,type:intMatch?"int":isCup?"cup":isDerby?"derby":"lg",played});

  if(G.rival) G.rival.g+=RI(0,1);
  if(!intMatch) G.nextOpp = genNextOpp();
}

// === SEASON END ===
function seasonEnd(){
  G.caHistory.push({a:G.age,c:Math.round(G.ca)});
  const atk=["ST","LW","RW","CAM"].includes(G.pos);
  if(G.goals>=25&&G.club.t<=2){G.awards.push({y:G.year,n:"联赛金靴"});}
  if(G.avgR>=7.8&&G.apps>=20){G.awards.push({y:G.year,n:"最佳阵容"});}
  if(G.ca>=160&&((atk&&G.goals>=18)||(!atk&&G.avgR>=7.5))&&G.club.t===1&&Math.random()>0.35){G.awards.push({y:G.year,n:"金球奖"});G.events.push({y:G.year,t:`🏆 金球奖！`,ic:"🏆"});}
  if(G.age<=21&&G.avgR>=7&&G.apps>=15){G.awards.push({y:G.year,n:"最佳新秀"});}
  if(!G.intTeam&&G.ca>=80&&G.avgR>=6.8){G.intTeam=true;G.events.push({y:G.year,t:`${G.nation.f} 入选国家队！`,ic:G.nation.f});}
  if(G.intTeam){G.intCaps+=RI(4,12);G.intGoals+=RI(0,atk?6:2);}

  if(G.league){
    G.league.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga));
    const pos=G.league.findIndex(t=>t.isMe)+1;
    G.leaguePos=pos;
    if(pos===1){G.awards.push({y:G.year,n:`${G.club.lg}冠军`});G.events.push({y:G.year,t:`🏆 联赛冠军！`,ic:"🏆"});}
  }

  if(G.club.t<=2&&G.leaguePos<=3){
    const rounds=["小组赛","十六强","八强","四强","决赛","冠军🏆"];
    let rd=0;
    while(rd<rounds.length-1){
      const chance=0.55+G.ca/500;
      if(Math.random()<chance)rd++;else break;
    }
    G.uclResult=rounds[rd];
    G.events.push({y:G.year,t:`🌍 欧冠${G.uclResult}`,ic:"🌍"});
    if(rd===rounds.length-1)G.awards.push({y:G.year,n:"欧冠冠军"});
  }

  if(G.year%4===2&&G.intTeam){
    G.worldCupA++;
    const ns=G.nation.id<=3?0.8:G.nation.id<=9?0.6:0.35;
    const rounds=["小组赛出局","十六强","八强","四强","决赛亚军","🏆 冠军！"];
    let rd=0;
    while(rd<rounds.length-1){
      const chance=(ns+G.ca/400)*0.5;
      if(Math.random()<chance)rd++;else break;
    }
    G.wcResult=rounds[rd];
    G.events.push({y:G.year,t:`🌍 世界杯${G.wcResult}`,ic:"🌍"});
    if(rd===rounds.length-1){G.worldCupW++;G.awards.push({y:G.year,n:"世界杯冠军"});}
    G.lastWC={year:G.year,group:[pick(INT_OPP),pick(INT_OPP),pick(INT_OPP)],result:G.wcResult};
  }

  if(!G.endorse)G.endorse=[];
  ENDORSEMENTS.forEach(e=>{if(G.ca>=e.r&&!G.endorse.find(x=>x.n===e.n)&&Math.random()>0.6){G.endorse.push({n:e.n,v:e.v,y:G.year});G.wage+=e.v;}});

  G.seasonLog.push({s:G.season,g:G.goals,a:G.ast,ap:G.apps,ar:G.avgR,cl:G.club.s,p:G.leaguePos||"-",ca:Math.round(G.ca)});
  if(G.rival){G.rival.ca=cl(G.rival.ca+R(-2,3),40,195);G.rival.g=RI(5,30);}
  G.league=null;
}

function genOffers(){
  G.offers=[];if(G.ca<60||G.age>34)return;
  const n=G.transferReq?RI(3,5):G.avgR>=7.5?RI(2,4):RI(0,2);
  const el=CLUBS.filter(c=>c.id!==G.club.id&&c.rep>=G.club.rep-15);
  for(let i=0;i<n&&el.length;i++){const c=el.splice(RI(0,el.length-1),1)[0];G.offers.push({club:c,wage:Math.round(G.wage*R(1.2,2.8)),years:RI(2,5),fee:Math.round(G.value*R(0.8,1.3))});}
  G.transferReq=false;
}

function calcValue(){const m=G.age<22?1.8:G.age<26?2.2:G.age<29?2:G.age<32?1.2:0.5;G.value=Math.round(G.ca*G.ca*m*R(30,60));}
function updateRole(){
  if(G.ca>=155&&G.cApps>200)G.teamRole="legend";
  else if(G.ca>=125&&G.apps>10&&G.avgR>=7.2)G.teamRole="star";
  else if(G.ca>=90&&G.apps>5)G.teamRole="starter";
  else if(G.ca>=60)G.teamRole="squad";
  else G.teamRole="youth";
  if(!G.isCaptain&&G.teamRole==="star"&&G.managerRel>=75&&G.cApps>=80&&Math.random()>0.7){G.isCaptain=true;G.events.push({y:G.year,t:`©️ 成为队长！`,ic:"©️"});}
}

function weeklyGrowth(){
  const age=G.age;let g=age<=18?1.8:age<=22?1.4:age<=25?0.8:age<=28?0.3:-0.2-(age-29)*0.12;
  if(g>0){
    const gap=Math.max(0,(G.pa-G.ca)/120),tm=G.trainFocus==="balanced"?0.7:0.55,mm=G.apps>0?0.8:0.3,cm=G.club.rep/100;
    G.ca=cl(G.ca+gap*(mm*(G.form/100)+tm)*g*cm,0,G.pa);
    const gr=(a,v)=>{G[a]=cl(G[a]+v,1,20);},s=()=>R(0,0.25)*g;
    if(G.trainFocus==="attack"){gr("shot",s());gr("drib",s());}
    else if(G.trainFocus==="defense"){gr("def",s());gr("phys",s());}
    else if(G.trainFocus==="physical"){gr("pace",s());gr("phys",s());}
    else if(G.trainFocus==="technical"){gr("pass",s());gr("drib",s());gr("mental",s());}
    else{["pace","shot","pass","drib","def","phys","mental"].forEach(a=>gr(a,s()*0.5));}
  }else{
    if(age>=30){const d=Math.log(age-28)*0.08;G.pace=cl(G.pace-d*R(0.3,0.6),1,20);G.phys=cl(G.phys-d*R(0.2,0.4),1,20);if(Math.random()>0.6){G.pass=cl(G.pass+R(0,0.15),1,20);G.mental=cl(G.mental+R(0,0.15),1,20);}}
    G.ca=cl(G.ca+g*0.3,30,200);
  }
  G.stam=cl(G.stam+R(5,15),0,100);
  if(G.hp>0){G.hpW--;if(G.hpW<=0){G.hp=0;G.hpW=0;if(G.cApps>5)G.events.push({y:G.year,t:`💪 伤愈复出！`,ic:"💪"});}}
  G.morale=cl(G.morale+R(-3,3),20,100);G.form=cl(G.form+R(-4,4),20,100);
  G.totalEarnings+=G.wage;G.savings+=G.wage;
  calcValue();
  if(G.rival)G.rival.ca=cl(G.rival.ca+R(-0.3,0.5),40,195);
}

// === ADVANCE ===
function doAdvance(){
  if(G.retired||G.pendingChoice)return false;

  if(!G.nextOpp) G.nextOpp = genNextOpp();
  const hm = Math.random() < 0.82;

  if(hm) {
    const intMatch = (G.intTeam && G.month % 3 === 0 && G.week === 2);
    if(intMatch) {
      simMatch(false, false, true);
    } else {
      simMatch(G.nextOpp.type==="derby", G.nextOpp.type==="cup", false);
    }
  } else {
    G.lastMatch = null;
  }

  weeklyGrowth();updateRole();
  G.week++;if(G.week>4){G.week=1;G.month++;if(G.month>12){G.month=1;G.year++;}}

  // Random Events
  if(Math.random()<0.045 && !G.pendingChoice){
    const choices = ["interview","wage"];
    if(G.intTeam && G.month>=3 && G.month<=4) choices.push("intl");
    if(G.age>=18) choices.push("romance_encounter");
    if(G.romance && G.romance.partners.length > 0) choices.push("romance_event", "romance_event");

    G.pendingChoice = pick(choices);
    if(G.pendingChoice==="romance_event") {
        const p = pick(G.romance.partners);
        G.romance_event_partner_id = p.id;
        if(p.status === "已婚" && Math.random() < 0.15 && G.romance.children.length < 3) {
            G.romance_event_type = "pregnant";
        } else if (p.status === "地下情" && Math.random() < 0.3) {
            G.romance_event_type = "scandal";
        } else {
            G.romance_event_type = pick(["gift", "date"]);
        }
    }
  }

  if(G.month===6&&G.week===1){
    seasonEnd();genOffers();G.pendingChoice="season_end";G.season++;G.age++;
    G.goals=0;G.ast=0;G.apps=0;G.avgR=0;G.totR=0;G.motm=0;G.matchLog=[];
    G.consecL=0;G.consecW=0;G._lN=false;G._wN=false;
    G.contract--;
    if(G.contract<=0)G.pendingChoice="free_agent";
    if(G.age>=35&&G.ca<80)G.pendingChoice="retire_ask";
    return false;
  }
  return !G.pendingChoice;
}
function advanceWeek(){doAdvance();render();}
function advance4(){let i=0;while(i<4&&doAdvance())i++;render();}
function simSeason(){let s=200;while(s-->0&&doAdvance());render();}

function acceptOffer(i){const o=G.offers[i];G.clubHist[G.clubHist.length-1].t=G.year;G.club=o.club;G.wage=o.wage;G.contract=o.years;G.clubHist.push({c:o.club.n,f:G.year,t:null});G.events.push({y:G.year,t:`✈️ 转会${o.club.n}`,ic:"✈️"});G.teamRole="squad";G.managerRel=60;G.fanPop=20;G.isCaptain=false;G.offers=[];G.pendingChoice=null;G.nextOpp=genNextOpp();G.league=null;render();}
function stayAtClub(){if(G.contract<=0){G.contract=RI(1,3);G.wage=Math.round(G.wage*R(1.1,1.5));}G.offers=[];G.pendingChoice=null;render();}
function retirePlayer(){G.retired=true;G.retireAge=G.age;G.clubHist[G.clubHist.length-1].t=G.year;G.pendingChoice="post_retire";render();}
function handleInterview(c){if(c==="h"){G.fanPop=cl(G.fanPop+5,0,100);G.managerRel=cl(G.managerRel+3,0,100);}else if(c==="b"){G.fanPop=cl(G.fanPop+8,0,100);G.managerRel=cl(G.managerRel-3,0,100);}else G.managerRel=cl(G.managerRel+5,0,100);G.pendingChoice=null;render();}
function handleIntl(c){if(c==="play")simMatch(false,false,true);G.pendingChoice=null;render();}
function requestTransfer(){G.transferReq=true;G.managerRel=cl(G.managerRel-15,0,100);notify("已申请");render();}
function handleWage(c){if(c==="ask"){if(Math.random()<0.6+G.managerRel/200){G.wage=Math.round(G.wage*R(1.15,1.4));notify("加薪！"+fmt$(G.wage)+"/周");}else notify("被拒");}G.pendingChoice=null;render();}
function choosePostRetire(c){G.postRetire=c;G.pendingChoice=null;VIEW="retire";render();}
function buyItem(id){const it=SHOP.find(x=>x.id===id);if(!it||G.savings<it.p||G.owned.includes(id))return;G.savings-=it.p;G.totalSpent+=it.p;G.owned.push(id);G.morale=cl(G.morale+it.m,20,100);G.fanPop=cl(G.fanPop+it.f,0,100);notify(it.i+" "+it.n);render();}
function spendOn(id){const it=SPEND.find(x=>x.id===id);if(!it||G.savings<it.p)return;G.savings-=it.p;G.totalSpent+=it.p;if(it.gamble){if(Math.random()<0.4){const w=Math.round(it.p*R(1.5,3));G.savings+=w;G.morale=cl(G.morale+8,20,100);notify("🎰赢"+fmt$(w));}else{G.morale=cl(G.morale-5,20,100);notify("🎰输了");}}else{G.morale=cl(G.morale+it.m,20,100);G.fanPop=cl(G.fanPop+it.f,0,100);notify(it.i+it.n);}render();}

// === ROMANCE ===
function initRomance(){if(!G.romance)G.romance={partners:[],active:null,married:false,children:[]};}
function meetLover(id){
  initRomance();
  const l=LOVERS.find(x=>x.id===id);if(!l)return;
  if(G.romance.partners.find(x=>x.id===id)){notify("你们已经认识了");G.pendingChoice=null;render();return;}
  let status = "约会中";
  G.romance.partners.push({id:l.id,name:l.name,love:20,status,gifts:[],ugCount:0});
  G.romance.active=l.id;
  G.events.push({y:G.year,t:`💕 ${G.name}与${l.name}开始${status}！`,ic:"💕"});
  notify(`💕 认识了 `+l.name);
  G.pendingChoice=null;render();
}
function giveGift(giftIdx){
  initRomance();
  const gift=GIFTS[giftIdx];if(!gift||G.savings<gift.p)return;
  const p=G.romance.partners.find(x=>x.id===G.romance.active);
  if(!p)return;
  G.savings-=gift.p;G.totalSpent+=gift.p;
  p.love=cl(p.love+gift.love,0,100);
  p.gifts.push(gift.n);
  notify(gift.emoji+" 送出"+gift.n+"给"+p.name);
  render();
}
function setActiveLover(id){initRomance();G.romance.active=id;render();}
function proposeTo(){
  initRomance();
  const p=G.romance.partners.find(x=>x.id===G.romance.active);
  if(!p||p.love<60){notify("好感度不够（需≥60）");return;}
  if(G.romance.married){notify("你已经结婚了！");return;}
  if(Math.random()<p.love/100){
    p.status="已婚"; G.romance.married=true;
    G.events.push({y:G.year,t:`💍 ${G.name}与${p.name}结婚了！`,ic:"💍"});
    G.morale=cl(G.morale+15,20,100);G.fanPop=cl(G.fanPop+10,0,100);
    notify("💍 恭喜结婚！");
  }else{
    p.love=cl(p.love-10,0,100);
    notify("😢 对方拒绝了求婚...");
  }
  render();
}
function doUnderground(){
  initRomance();
  const p=G.romance.partners.find(x=>x.id===G.romance.active);
  if(!p){notify("请先选择对象");return;}
  if(G.savings<10000){notify("需要€10K来掩人耳目");return;}
  G.savings-=10000;
  p.status = "地下情";
  p.ugCount = (p.ugCount || 0) + 1;
  p.love = cl(p.love+RI(5,15), 0, 100);
  notify("🤫 秘密幽会成功...");
  if (Math.random() < 0.15) {
      G.pendingChoice = "romance_event";
      G.romance_event_partner_id = p.id;
      G.romance_event_type = "scandal";
  }
  render();
}
function haveChild(){
  initRomance();
  const p=G.romance.partners.find(x=>x.id===G.romance.active);
  if(!p){return;}
  const names=["小明","小美","乐乐","安安","天天","星星","果果","豆豆"];
  const child={name:pick(names),year:G.year,parent:p.name};
  G.romance.children.push(child);
  G.events.push({y:G.year,t:`👶 ${G.name}和${p.name}迎来了宝宝${child.name}！`,ic:"👶"});
  G.morale=cl(G.morale+10,20,100);G.fanPop=cl(G.fanPop+5,0,100);
  notify("👶 宝宝"+child.name+"出生了！");
  render();
}
function goDate(){
  initRomance();
  const p=G.romance.partners.find(x=>x.id===G.romance.active);
  if(!p){notify("请先选择对象");return;}
  if(G.savings<5000){notify("需要€5K");return;}
  G.savings-=5000;
  p.love=cl(p.love+RI(3,8),0,100);
  const dates=["一起看电影","海边散步","高级餐厅约会","主题公园","艺术展览","音乐会"];
  notify("❤️ "+pick(dates)+" love+");
  render();
}
function handleRomanceEvent(action) {
    const p = G.romance.partners.find(x => x.id === G.romance_event_partner_id);
    if(action === 'pregnant') {
        const names=["小明","小美","乐乐","安安","天天","星星","果果","豆豆"];
        const child={name:pick(names),year:G.year,parent:p.name};
        G.romance.children.push(child);
        G.events.push({y:G.year,t:`👶 ${G.name}和${p.name}迎来了宝宝${child.name}！`,ic:"👶"});
        G.morale=cl(G.morale+10,20,100); G.fanPop=cl(G.fanPop+5,0,100);
        notify("👶 恭喜当爸爸了！");
    } else if (action === 'pay_scandal') {
        if (G.savings >= 100000) {
            G.savings -= 100000;
            notify("已支付封口费，躲过一劫");
        } else {
            notify("钱不够！丑闻曝光！");
            G.fanPop = cl(G.fanPop - 20, 0, 100);
            const wife = G.romance.partners.find(x => x.status === "已婚");
            if (wife) wife.love = cl(wife.love - 30, 0, 100);
        }
    } else if (action === 'ignore_scandal') {
        notify("地下情曝光！");
        G.fanPop = cl(G.fanPop - 20, 0, 100);
        const wife = G.romance.partners.find(x => x.status === "已婚");
        if (wife) wife.love = cl(wife.love - 30, 0, 100);
    } else if (action === 'buy_gift') {
        if (G.savings >= 10000) {
            G.savings -= 10000;
            p.love = cl(p.love + 8, 0, 100);
            notify("送出礼物，好感上升");
        } else {
            notify("钱不够！");
            p.love = cl(p.love - 5, 0, 100);
        }
    } else if (action === 'refuse_gift' || action === 'refuse_date') {
        p.love = cl(p.love - 5, 0, 100);
        notify("对方有些失落");
    } else if (action === 'go_date') {
        if (G.savings >= 2000) {
            G.savings -= 2000;
            p.love = cl(p.love + 5, 0, 100);
            notify("浪漫约会，好感上升");
        } else {
            notify("钱不够！");
            p.love = cl(p.love - 5, 0, 100);
        }
    }
    G.pendingChoice = null;
    render();
}

  if(VIEW==="create"){

    h+=`<div class="mb6"><div class="dim xx mb4">国籍</div><div style="display:flex;flex-wrap:wrap;gap:3px">`;
    NATIONS.forEach(n=>{h+=`<button class="b ${CC.nation===n.id?'bp':''}" style="padding:2px 6px;font-size:9px" onclick="CC.nation=${n.id};render()">${n.f}${n.n}</button>`;});
    h+=`</div></div><div class="mb6"><div class="dim xx mb4">位置</div><div style="display:flex;flex-wrap:wrap;gap:3px">`;
    Object.entries(POS).forEach(([k,v])=>{h+=`<button class="b ${CC.pos===k?'bp':''}" style="padding:2px 6px;font-size:9px" onclick="CC.pos='${k}';render()">${v.e}${v.n}</button>`;});
    h+=`</div></div><div class="mb6"><div class="dim xx mb4">青训</div><div style="display:flex;gap:3px">`;
    YOUTH.forEach((y,i)=>{h+=`<button class="b ${CC.yci===i?'bp':''}" style="padding:2px 6px;font-size:9px;flex:1" onclick="CC.yci=${i};render()">${y.s}</button>`;});
    h+=`</div></div><div class="mb6"><div class="dim xx mb4">难度</div><div style="display:flex;gap:3px">`;

    h+=`<div class="g2 mt4"><button class="b bf bs" onclick="loadGame()">📂读档</button><button class="b bf" onclick="localStorage.removeItem('gp5_2');notify('已删')">🗑️</button></div>`;
    h+=`</div></div>`;
    document.getElementById('app').innerHTML=h;
    window.scrollTo(0, scrollPos);
    return;
  }
  if(!G){document.getElementById('app').innerHTML='';return;}

  }

    h+=`<div class="c"><div class="sg" style="margin:0">${[{l:"⚽",v:G.goals},{l:"🅰️",v:G.ast},{l:"📊",v:G.apps},{l:"⭐",v:G.avgR||"-"},{l:"🏅",v:G.motm}].map(s=>`<div class="sb"><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div></div>`;
    h+=`<div class="c"><div class="sg" style="margin:0">${[{l:"总场",v:G.cApps},{l:"总球",v:G.cGoals},{l:"总助",v:G.cAst},{l:"🎩",v:G.cHatTricks},{l:"🏆",v:G.awards.length},{l:"🌍",v:G.intCaps}].map(s=>`<div class="sb"><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div></div>`;
    if(G.caHistory.length>1){const mx=Math.max(...G.caHistory.map(x=>x.c));h+=`<div class="c"><div class="xx bold mb4">📈 曲线</div><div class="cr">`;G.caHistory.forEach(p=>{h+=`<div class="cr-b" style="height:${Math.max(5,(p.c/mx)*100)}%;background:${p.c>=150?'var(--gold)':p.c>=100?'var(--a)':'var(--a2)'}" data-t="${p.a}岁:${p.c}"></div>`;});h+=`</div></div>`;}
    h+=`<div class="c xx"><div class="fb mb4"><span class="dim">周薪</span><span class="ac bold">${fmt$(G.wage)}</span></div><div class="fb mb4"><span class="dim">身价</span><span class="gd bold">${fmt$(G.value)}</span></div><div class="fb mb4"><span class="dim">存款</span><span class="gd">${fmt$(G.savings)}</span></div><div class="fb"><span class="dim">总消费</span><span class="orange">${fmt$(G.totalSpent)}</span></div></div>`;
    h+=`</div>`;
  }

  // === SHOP ===
  if(VIEW==="shop"){
    h+=`<div class="an"><div class="fb mb6"><div class="s" style="margin:0">🛍️ 消费</div><div class="gd bold xx">${fmt$(G.savings)}</div></div>`;
    h+=`<div class="s mt6">🏠 资产</div>`;
    SHOP.forEach(it=>{
      const owned=G.owned.includes(it.id),can=G.savings>=it.p&&!owned;
      h+=`<div class="sh-i" style="${owned?'opacity:.5':''}"><div style="font-size:20px;width:28px;text-align:center">${it.i}</div><div style="flex:1"><div class="bold xx">${it.n}</div><div class="xx dim">${it.d}</div></div>${owned?'<div class="xx ac">✓</div>':`<div><div class="xx gd bold">${fmt$(it.p)}</div><button class="b bp" style="padding:2px 8px;font-size:8px;margin-top:2px" ${can?`onclick="buyItem('${it.id}')"`:'disabled'}>买</button></div>`}</div>`;
    });
    h+=`<div class="s mt12">🎉 体验</div>`;
    SPEND.forEach(it=>{
      const can=G.savings>=it.p;
      h+=`<div class="sh-i"><div style="font-size:20px;width:28px;text-align:center">${it.i}</div><div style="flex:1"><div class="bold xx">${it.n}${it.gamble?' <span class="orange">赌</span>':''}</div><div class="xx dim">${it.d}</div></div><div><div class="xx gd bold">${fmt$(it.p)}</div><button class="b bp" style="padding:2px 8px;font-size:8px;margin-top:2px" ${can?`onclick="spendOn('${it.id}')"`:'disabled'}>${it.gamble?'赌':'用'}</button></div></div>`;
    });
    h+=`</div>`;
  }

  // === ROMANCE ===
  if(VIEW==="love"){
    initRomance();
    h+=`<div class="an"><div class="s">💕 恋爱关系</div>`;
    if(G.romance.partners.length){
      G.romance.partners.forEach(p=>{
        const l=LOVERS.find(x=>x.id===p.id);
        const isActive=G.romance.active===p.id;
        h+=`<div class="c ${isActive?'pk':''}" onclick="setActiveLover('${p.id}')" style="cursor:pointer"><div class="fb"><div class="fc"><div style="font-size:20px">${l?.emoji||"💕"}</div><div><div class="bold xx">${p.name} <span class="dim xx">${l?.job}</span></div><div class="xx dim">${p.status==="地下情"?`<span class="rd">🤫 地下情</span>`:p.status} · 好感${Math.round(p.love)}</div></div></div><div class="xp" style="width:50px"><div class="xp-f" style="width:${p.love}%;background:var(--pink)"></div></div></div>`;
        if(isActive){
          h+=`<div class="g2 mt6"><button class="b bf" onclick="goDate()">❤️约会 €5K</button>`;
          if(!G.romance.married && p.status!=="已婚"){h+=`<button class="b bf" onclick="proposeTo()">💍求婚</button>`;}
          if(G.romance.married && p.status!=="已婚"){h+=`<button class="b bf bd" onclick="doUnderground()">🤫 发展地下情</button>`;}
          if(p.status==="已婚"){h+=`<button class="b bf" onclick="haveChild()">👶生宝宝</button>`;}
          h+=`</div>`;
          if (p.ugCount > 0) {
            h+=`<div class="xx mt4"><span class="rd bold">🤫 做爱潮喷次数：${p.ugCount} 次</span></div>`;
          }
          h+=`<div class="xx dim mt4">🎁 送礼：</div><div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:3px">`;
          GIFTS.forEach((g,gi)=>{h+=`<button class="b" style="padding:2px 6px;font-size:8px" ${G.savings>=g.p?`onclick="giveGift(${gi})"`:'disabled'}>${g.emoji}${g.n} ${fmt$(g.p)}</button>`;});
          h+=`</div>`;
        }
        h+=`</div>`;
      });
    }

    const unmet=LOVERS.filter(l=>!G.romance.partners.find(p=>p.id===l.id));
    if(unmet.length&&G.age>=18){
      h+=`<div class="s mt8">🔍 认识新的人</div>`;
      unmet.forEach(l=>{
        h+=`<div class="c ck" onclick="meetLover('${l.id}')"><div class="fc"><div style="font-size:18px">${l.emoji}</div><div><div class="bold xx">${l.name} <span class="dim">${l.age}岁·${l.job}</span></div><div class="xx dim">${l.desc}</div></div></div></div>`;
      });
    }

    if(G.romance.children.length){
      h+=`<div class="s mt8">👨‍👩‍👧‍👦 家庭</div><div class="c">`;
      G.romance.children.forEach(c=>{h+=`<div class="xx" style="padding:2px 0">👶 ${c.name} (${c.year}年) — 母亲：${c.parent}</div>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  // === HISTORY ===
  if(VIEW==="history"){
    h+=`<div class="an"><div class="tp"><button class="tpb ${ST==='season'?'on':''}" onclick="ST='season';render()">赛季</button><button class="tpb ${ST==='matches'?'on':''}" onclick="ST='matches';render()">比赛</button></div>`;
    if(ST==="season"){
      if(G.seasonLog.length){h+=`<div class="c" style="padding:0;overflow-x:auto"><table class="tbl"><thead><tr><th>S</th><th>队</th><th class="ce">场</th><th class="ce">⚽</th><th class="ce">🅰️</th><th class="ce">⭐</th><th class="ce" style="color:var(--a)">CA</th><th class="ce">#</th></tr></thead><tbody>`;G.seasonLog.slice().reverse().forEach(s=>{h+=`<tr><td>${s.s}</td><td>${s.cl}</td><td class="ce">${s.ap}</td><td class="ce">${s.g}</td><td class="ce">${s.a}</td><td class="ce">${s.ar}</td><td class="ce ac bold">${s.ca}</td><td class="ce">${s.p}</td></tr>`;});h+=`</tbody></table></div>`;}else h+=`<div class="c dim xx center">暂无</div>`;}
    if(ST==="matches"){if(!G.matchLog.length)h+=`<div class="c dim xx center">暂无</div>`;else{h+=`<div class="c" style="padding:4px 6px">`;G.matchLog.slice().reverse().forEach(m=>{const rc=m.res==="胜"?"ac":m.res==="负"?"rd":"dim";const ti=m.type==="int"?"🌍":m.type==="cup"?"🏆":m.type==="derby"?"🔥":"⚽";h+=`<div class="mr"><span class="xx">${ti}</span><span style="flex:1" class="xx">vs ${m.opp}</span><span class="bold ${rc} xx" style="min-width:24px;text-align:center">${m.tg}-${m.og}</span><span class="xx bold" style="min-width:18px;text-align:center;color:${m.r>=8?'var(--gold)':m.r>=7?'var(--a)':m.r<5.5?'var(--red)':'var(--text)'}">${m.r}</span><span class="xx dim">${m.played?`⚽${m.g}`:"未上场"}</span>${m.motm?'<span class="gd xx">⭐</span>':''}</div>`;});h+=`</div>`;}}
    h+=`</div>`;
  }

  // === CAREER ===
  if(VIEW==="career"){
    h+=`<div class="an"><div class="s">📖 履历</div><div class="c">`;
    G.clubHist.forEach(c=>{h+=`<div class="fb xx" style="padding:2px 0;border-bottom:1px solid var(--bdr)"><span class="bold">${esc(c.c)}</span><span class="dim">${c.f}${c.t?'-'+c.t:'-至今'}</span></div>`;});
    h+=`</div>`;
    if(G.awards.length){
      h+=`<div class="s mt8">🏆 荣誉 (${G.awards.length})</div><div class="c">`;
      const grouped={};
      G.awards.forEach(a=>{if(!grouped[a.n])grouped[a.n]=[];grouped[a.n].push(a.y);});
      Object.entries(grouped).forEach(([name,years])=>{
        h+=`<div class="fb xx" style="padding:2px 0;border-bottom:1px solid var(--bdr)"><span class="gd bold">${name} ×${years.length}</span><span class="dim">${years.join(', ')}</span></div>`;
      });
      h+=`</div>`;
    }
    h+=`<div class="s mt8">📰 大事记</div><div class="tl" style="margin-left:5px">`;
    G.events.slice(-15).reverse().forEach(e=>{h+=`<div class="tl-i"><div class="tl-d"></div><div class="xx" style="padding-left:6px"><span class="dim">${e.y}</span> ${e.ic||""} ${esc(e.t)}</div></div>`;});
    h+=`</div></div>`;
  }

  // === TRAINING ===
  if(VIEW==="train"){
    h+=`<div class="an"><div class="s">🏋️ 训练</div><div class="cg">`;
    [{id:"balanced",n:"均衡",d:"全面",i:"⚖️"},{id:"attack",n:"进攻",d:"射门+盘带",i:"⚽"},{id:"technical",n:"技术",d:"传球+心理",i:"🎯"},{id:"physical",n:"体能",d:"速度+体能",i:"💪"},{id:"defense",n:"防守",d:"防守+体能",i:"🛡️"}].forEach(o=>{const on=G.trainFocus===o.id;h+=`<div class="cb" style="${on?'border-color:var(--a);background:var(--glow)':''}" onclick="G.trainFocus='${o.id}';render()"><div class="bold xx">${o.i} ${o.n} ${on?'<span class="ac">✓</span>':''}</div><div class="xx dim">${o.d}</div></div>`;});
    h+=`</div><div class="s mt8">属性</div><div class="c"><div class="g2">${aB("速度",G.pace)}${aB("射门",G.shot)}${aB("传球",G.pass)}${aB("盘带",G.drib)}${aB("防守",G.def)}${aB("体能",G.phys)}${aB("心理",G.mental)}</div></div>`;
    const gl=G.age<=18?"🚀爆发":G.age<=22?"📈快速":G.age<=25?"📊稳定":G.age<=28?"⏸巅峰":"📉衰退";
    h+=`<div class="c xx"><div class="fb"><span class="dim">阶段</span><span class="bold">${gl}</span></div><div class="fb mt4"><span class="dim">空间</span><span class="ac bold">${Math.round(G.pa-G.ca)}</span></div></div></div>`;
  }

  // === RETIRE ===
  if(VIEW==="retire"){
    h+=`<div class="an center"><div style="font-size:44px;margin-top:16px">👋</div><div class="logo" style="font-size:16px;margin-top:6px">传奇谢幕</div><div class="dim xx mt4">${esc(G.name)}·${G.retireAge}岁·${G.year}</div>`;
    h+=`<div class="c mt8" style="text-align:left"><div class="sg" style="margin:0">${[{l:"场",v:G.cApps},{l:"球",v:G.cGoals},{l:"助",v:G.cAst},{l:"🎩",v:G.cHatTricks},{l:"🏆",v:G.awards.length},{l:"🌍",v:G.intCaps},{l:"💰",v:fmt$(G.totalEarnings)}].map(s=>`<div class="sb"><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div></div>`;
    if(G.awards.length){h+=`<div class="c mt4" style="text-align:left"><div class="bold xx mb4">🏆 荣誉</div>`;const gr={};G.awards.forEach(a=>{if(!gr[a.n])gr[a.n]=[];gr[a.n].push(a.y);});Object.entries(gr).forEach(([n,y])=>{h+=`<div class="xx gd">${n} ×${y.length}</div>`;});h+=`</div>`;}
    if(G.romance?.children?.length){h+=`<div class="c mt4" style="text-align:left"><div class="bold xx mb4">👨‍👩‍👧‍👦 家庭</div>`;G.romance.children.forEach(c=>{h+=`<div class="xx">👶 ${c.name} (${c.year})</div>`;});h+=`</div>`;}
    let leg=G.cApps>=500&&G.awards.length>=8?"⭐⭐⭐⭐⭐ 球王":G.cApps>=350&&G.awards.length>=5?"⭐⭐⭐⭐ 巨星":G.cApps>=200&&G.awards.length>=2?"⭐⭐⭐ 世界级":G.cApps>=100?"⭐⭐ 优秀":"⭐ 职业";
    h+=`<div class="c mt4 gl"><div class="xx dim">评级</div><div class="gd bold" style="font-size:15px;margin-top:2px">${leg}</div></div>`;
    if(G.postRetire){h+=`<div class="c mt4"><div class="bold xx">${G.postRetire==="coach"?"🧑‍🏫 主教练":G.postRetire==="pundit"?"🎙️ 评论员":"🏢 总监"}</div></div>`;}
    h+=`<button class="b bp" style="padding:10px 30px;font-size:12px;margin-top:10px" onclick="CC={name:'',nation:12,pos:'ST',diff:1,yci:0};G=null;VIEW='create';render()">🔄 重新开始</button></div>`;
  }

  h+=`</div>`;
  document.getElementById('app').innerHTML=h;
  window.scrollTo(0, scrollPos); // preserve scroll
}

function renderChoice(){
  let h=`<div class="an">`;
  if(G.pendingChoice==="season_end"){
    h+=`<div class="c gl center"><div style="font-size:24px">📅</div><div class="bold mt4 x">S${G.season-1} 结束</div>`;
    if(G.leaguePos)h+=`<div class="xx mt4">${G.club.n} ${G.club.lg} 第${G.leaguePos}</div>`;
    if(G.uclResult)h+=`<div class="xx">欧冠：${G.uclResult}</div>`;
    if(G.wcResult)h+=`<div class="xx">世界杯：${G.wcResult}</div>`;
    const sl=G.seasonLog[G.seasonLog.length-1];
    if(sl){h+=`<div class="sg mt4">${[{l:"⚽",v:sl.g},{l:"🅰️",v:sl.a},{l:"📊",v:sl.ap},{l:"⭐",v:sl.ar},{l:"CA",v:sl.ca}].map(s=>`<div class="sb"><div class="sb-v">${s.v}</div><div class="sb-l">${s.l}</div></div>`).join("")}</div>`;}
    h+=`</div>`;
    G.uclResult=null;G.wcResult=null;
    if(G.offers.length){h+=`<div class="s mt8">📨 邀约</div>`;G.offers.forEach((o,i)=>{const up=o.club.rep>G.club.rep;h+=`<div class="c ck" onclick="acceptOffer(${i})"><div class="fb"><div><div class="bold xx">${o.club.n}${up?' <span class="gn">↑</span>':''}</div><div class="dim xx">${o.club.lg}·${o.club.rep}</div></div><div style="text-align:right"><div class="ac bold xx">${fmt$(o.wage)}/周</div><div class="xx dim">${o.years}年</div></div></div></div>`;});}
    h+=`<button class="b bf mt6" onclick="stayAtClub()">${G.contract>0?`留在${G.club.s}`:'续约'}</button>`;
    if(G.age>=32)h+=`<button class="b bd bf mt4" onclick="retirePlayer()">👋 退役</button>`;
  }else if(G.pendingChoice==="free_agent"){
    h+=`<div class="c gl center"><div style="font-size:24px">📋</div><div class="bold mt4">合同到期</div></div>`;
    if(G.offers.length){G.offers.forEach((o,i)=>{h+=`<div class="c ck" onclick="acceptOffer(${i})"><div class="fb"><div class="bold xx">${o.club.n}</div><div class="ac bold xx">${fmt$(o.wage)}/周 ${o.years}年</div></div></div>`;});}
    h+=`<button class="b bf mt4" onclick="stayAtClub()">续约</button>`;
    if(G.age>=30)h+=`<button class="b bd bf mt4" onclick="retirePlayer()">👋</button>`;
  }else if(G.pendingChoice==="retire_ask"){
    h+=`<div class="c gl center"><div style="font-size:24px">🤔</div><div class="bold mt4">退役？</div></div>`;
    h+=`<button class="b bp bf mt6" onclick="G.pendingChoice=null;render()">💪继续</button><button class="b bd bf mt4" onclick="retirePlayer()">👋退役</button>`;
  }else if(G.pendingChoice==="interview"){
    h+=`<div class="c center"><div style="font-size:20px">🎤</div><div class="bold mt4 xx">采访</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="handleInterview('h')"><div class="bold xx">🙏 谦虚</div></div>`;
    h+=`<div class="cb" onclick="handleInterview('b')"><div class="bold xx">🔥 霸气</div></div>`;
    h+=`<div class="cb" onclick="handleInterview('c')"><div class="bold xx">🤝 挺教练</div></div></div>`;
  }else if(G.pendingChoice==="intl"){
    h+=`<div class="c center"><div style="font-size:20px">${G.nation.f}</div><div class="bold mt4 xx">国家队征召</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="handleIntl('play')"><div class="bold xx">${G.nation.f} 出战</div></div>`;
    h+=`<div class="cb" onclick="handleIntl('skip')"><div class="bold xx">🏠 留守休整</div></div></div>`;
  }else if(G.pendingChoice==="wage"){
    h+=`<div class="c center"><div style="font-size:20px">💰</div><div class="bold mt4 xx">续约谈判</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="handleWage('ask')"><div class="bold xx">💰 要求加薪</div></div>`;
    h+=`<div class="cb" onclick="handleWage('skip')"><div class="bold xx">🤝 维持现状</div></div></div>`;
  }else if(G.pendingChoice==="romance_encounter"){
    const unmet=LOVERS.filter(l=>!(G.romance?.partners||[]).find(p=>p.id===l.id));
    if(unmet.length){
      const l=pick(unmet);
      h+=`<div class="c pk center"><div style="font-size:24px">${l.emoji}</div><div class="bold mt4 xx">偶遇 ${l.name}</div><div class="xx dim mt4">${l.age}岁·${l.job}·${l.desc}</div></div><div class="cg">`;
      h+=`<div class="cb" onclick="meetLover('${l.id}')"><div class="bold xx">💕 搭讪认识</div></div>`;
      h+=`<div class="cb" onclick="G.pendingChoice=null;render()"><div class="bold xx">🚶 擦肩而过</div></div></div>`;
    }else{G.pendingChoice=null;render();return h;}
  }else if(G.pendingChoice==="romance_event"){
    const p = G.romance.partners.find(x=>x.id===G.romance_event_partner_id);
    const t = G.romance_event_type;
    const l = LOVERS.find(x => x.id === p.id);
    h += `<div class="c pk center"><div style="font-size:24px">${l.emoji}</div><div class="bold mt4 xx">${p.name}</div><div class="xx dim">${p.status}</div></div><div class="cg">`;
    if (t === "pregnant") {
        h += `<div class="xx pk mb6 center">亲爱的，我怀孕了！我们要当父母了！</div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('pregnant')"><div class="bold xx">太棒了！👶</div></div>`;
    } else if (t === "scandal") {
        h += `<div class="xx rd mb6 center">【突发狗仔】你和${p.name}的地下情险些曝光！狗仔索要封口费。</div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('pay_scandal')"><div class="bold xx">支付 €100K 封口 (-€100K)</div></div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('ignore_scandal')"><div class="bold xx">不理会！(大量掉粉，妻子大怒)</div></div>`;
    } else if (t === "gift") {
        h += `<div class="xx pk mb6 center">亲爱的，我最近看中了一条很美的项链，买给我好不好？(€10K)</div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('buy_gift')"><div class="bold xx">买买买！(-€10K, 好感+)</div></div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('refuse_gift')"><div class="bold xx">太贵了，下次吧 (好感-)</div></div>`;
    } else if (t === "date") {
        h += `<div class="xx pk mb6 center">我们好久没出去约会了，今晚陪我吃饭吧？(€2K)</div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('go_date')"><div class="bold xx">好啊，走起！(-€2K, 好感+)</div></div>`;
        h += `<div class="cb" onclick="handleRomanceEvent('refuse_date')"><div class="bold xx">我要训练，没空 (好感-)</div></div>`;
    }
    h += `</div>`;
  }else if(G.pendingChoice==="post_retire"){
    h+=`<div class="c gl center"><div style="font-size:24px">🔮</div><div class="bold mt4">退役后的生活？</div></div><div class="cg">`;
    h+=`<div class="cb" onclick="choosePostRetire('coach')"><div class="bold xx">🧑‍🏫 转型主教练</div></div>`;
    h+=`<div class="cb" onclick="choosePostRetire('pundit')"><div class="bold xx">🎙️ 成为评论员</div></div>`;
    h+=`<div class="cb" onclick="choosePostRetire('director')"><div class="bold xx">🏢 担任俱乐部高管</div></div></div>`;
  }
  h+=`</div>`;return h;
